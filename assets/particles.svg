<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1180 610">
  <!-- Glowing particles with SMIL animation (Ice Blue / Soft Cyan / Teal) -->
  <g fill="#38BDF8" opacity="0.5">
    <circle cx="150" cy="400" r="1.5">
      <animate attributeName="cy" values="400;370;400" dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="8s" repeatCount="indefinite" />
    </circle>
    <circle cx="280" cy="180" r="2">
      <animate attributeName="cy" values="180;150;180" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1;0.8;0.1" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="390" cy="480" r="1">
      <animate attributeName="cy" values="480;460;480" dur="10s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="10s" repeatCount="indefinite" />
    </circle>
    <circle cx="480" cy="120" r="2.5">
      <animate attributeName="cy" values="120;90;120" dur="7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="7s" repeatCount="indefinite" />
    </circle>
  </g>

  <g fill="#60A5FA" opacity="0.4">
    <circle cx="720" cy="520" r="2">
      <animate attributeName="cy" values="520;490;520" dur="9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="9s" repeatCount="indefinite" />
    </circle>
    <circle cx="850" cy="140" r="1.5">
      <animate attributeName="cy" values="140;110;140" dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="8s" repeatCount="indefinite" />
    </circle>
    <circle cx="980" cy="380" r="2">
      <animate attributeName="cy" values="380;350;380" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1;0.8;0.1" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="1100" cy="220" r="1.5">
      <animate attributeName="cy" values="220;190;220" dur="11s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="11s" repeatCount="indefinite" />
    </circle>
  </g>

  <g fill="#14B8A6" opacity="0.4">
    <circle cx="580" cy="340" r="1.5">
      <animate attributeName="cy" values="340;310;340" dur="12s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="12s" repeatCount="indefinite" />
    </circle>
    <circle cx="640" cy="210" r="2">
      <animate attributeName="cy" values="210;185;210" dur="7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="7s" repeatCount="indefinite" />
    </circle>
    <circle cx="910" cy="280" r="1">
      <animate attributeName="cy" values="280;260;280" dur="9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="9s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
