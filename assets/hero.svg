<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" viewBox="0 0 1180 610">
  <defs>
    <!-- Soft sky blue -> baby blue highlight gradient for vector contours -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#89CFF0" />
      <stop offset="100%" stop-color="#5DADE2" />
    </linearGradient>

    <!-- Subtle Ambient Radial Glow behind portrait -->
    <radialGradient id="headGlow" cx="20%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#5DADE2" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#5DADE2" stop-opacity="0" />
    </radialGradient>

    <!-- Reveal Mask for portrait line-by-line drawing sweep -->
    <mask id="portraitRevealMask">
      <rect x="0" y="0" width="1180" height="0" fill="#ffffff">
        <animate attributeName="height" to="610" dur="2.4s" begin="0.2s" fill="freeze" keyTimes="0;1" calcMode="spline" keySplines="0.1 0.8 0.2 1" />
      </rect>
    </mask>

    <!-- Terminal Window Fade In Mask -->
    <mask id="terminalReveal">
      <rect x="0" y="0" width="1180" height="610" fill="#ffffff" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.8s" begin="0.1s" fill="freeze" />
      </rect>
    </mask>
  </defs>

  <style>
    .font-mono { font-family: "SF Mono", "Fira Code", Consolas, Menlo, monospace; }
    
    /* Terminal background and border colors */
    .term-bg { fill: #050816; }
    .term-border { fill: none; stroke: rgba(255, 255, 255, 0.08); stroke-width: 1.5; }
    
    /* Vector Portrait Styles */
    .contour-line { fill: none; stroke: url(#accentGrad); stroke-linecap: round; stroke-linejoin: round; }
    .contour-primary { stroke-width: 1.6; }
    .contour-secondary { stroke-width: 1.0; opacity: 0.6; }
    .contour-stubble { stroke: #94A3B8; stroke-width: 1.0; stroke-dasharray: 2 3; opacity: 0.7; }
    .fill-dark { fill: #050816; }
    .fill-panel { fill: #0F172A; }
    
    /* Text styling */
    .header-text { fill: #5DADE2; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; }
    .console-row { font-size: 11px; fill: #94A3B8; font-weight: 500; }
    .console-dots { fill: #334155; font-weight: 400; }
    .console-val { fill: #F8FAFC; font-weight: 500; }
    .console-val-success { fill: #89CFF0; font-weight: 700; }
    .console-val-highlight { fill: #5DADE2; font-weight: 700; }
    .separator { fill: #334155; font-size: 11px; font-weight: 400; }
    .tech-text { font-family: "SF Mono", "Fira Code", Consolas, monospace; font-size: 8px; fill: #5DADE2; opacity: 0.6; }
  </style>

  <!-- ================= BACKGROUND LAYOUT ================= -->
  <rect width="100%" height="100%" class="term-bg" rx="16" />

  <!-- Subtle Glow for Portrait -->
  <circle cx="260" cy="300" r="280" fill="url(#headGlow)" />

  <!-- Terminal Window Content Container -->
  <g mask="url(#terminalReveal)">
    <!-- Mac Window Controls -->
    <g transform="translate(30, 20)">
      <circle cx="10" cy="15" r="5" fill="#EF4444" />
      <circle cx="26" cy="15" r="5" fill="#F59E0B" />
      <circle cx="42" cy="15" r="5" fill="#5DADE2" />
    </g>
    
    <!-- Window Title in Center -->
    <text x="590" y="38" fill="#475569" class="font-mono" font-size="11" text-anchor="middle">nagaraju@flow-os: ~</text>
    <line x1="30" y1="52" x2="1150" y2="52" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" />

    <!-- ================= LEFT SIDE: HIGH-FIDELITY SVG LINE ART PORTRAIT ================= -->
    <g transform="translate(35, 75)" mask="url(#portraitRevealMask)">
      <!-- Subtle Floating Motion -->
      <g transform="translate(0, 0)">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="6s" repeatCount="indefinite" />

        <!-- Grid overlay -->
        <g opacity="0.015">
          <path d="M 0 50 L 450 50 M 0 100 L 450 100 M 0 150 L 450 150 M 0 200 L 450 200 M 0 250 L 450 250 M 0 300 L 450 300 M 0 350 L 450 350 M 0 400 L 450 400" stroke="#ffffff" stroke-width="1" />
          <path d="M 50 0 L 50 450 M 100 0 L 100 450 M 150 0 L 150 450 M 200 0 L 200 450 M 250 0 L 250 450 M 300 0 L 300 450 M 350 0 L 350 450 M 400 0 L 400 450" stroke="#ffffff" stroke-width="1" />
        </g>

        <!-- Bounding Corner Brackets -->
        <g stroke="#5DADE2" stroke-width="1" opacity="0.3" fill="none">
          <path d="M 25 45 L 25 25 L 45 25" />
          <path d="M 405 25 L 425 25 L 425 45" />
          <path d="M 25 405 L 25 425 L 45 425" />
          <path d="M 405 425 L 425 425 L 425 405" />
        </g>

        <!-- Technical Labels -->
        <g class="tech-text">
          <text x="35" y="40">SYS.PORTRAIT // NAGARAJU KISHORE VARMA</text>
          <text x="35" y="415">LOC: 16.5000° N, 80.6400° E</text>
          <text x="415" y="40" text-anchor="end">STATUS: ACTIVE</text>
          <text x="415" y="415" text-anchor="end">OS: FLOW_OS_v0.9.0</text>
        </g>

        <!-- Face Shape -->
        <path class="contour-line contour-primary fill-panel" d="M 165,185 C 165,260 190,308 222,308 C 255,308 280,260 280,185 C 280,160 268,145 222,145 C 176,145 165,160 165,185 Z" />

        <!-- Ears -->
        <path class="contour-line contour-secondary" d="M 165,188 C 158,188 156,202 163,208" />
        <path class="contour-line contour-secondary" d="M 280,188 C 287,188 289,202 282,208" />

        <!-- Volumetric Curly Hair Base -->
        <path class="contour-line contour-primary fill-dark" d="M 152,185 C 142,140 148,95 178,78 C 193,70 215,65 230,75 C 248,68 275,68 290,82 C 304,95 306,120 302,140 C 310,150 308,168 294,185 C 288,190 280,185 280,185 Z" />

        <!-- Hair Curvature Textures -->
        <path class="contour-line contour-secondary" d="M 160,150 C 170,120 190,110 210,130" />
        <path class="contour-line contour-secondary" d="M 180,130 C 195,100 220,105 235,135" />
        <path class="contour-line contour-secondary" d="M 200,142 C 210,120 225,120 232,145" />
        <path class="contour-line contour-secondary" d="M 240,110 C 255,85 280,100 290,130" />
        <path class="contour-line contour-secondary" d="M 175,90 C 200,75 230,80 250,95" />
        <path class="contour-line contour-secondary" d="M 220,70 C 245,60 270,68 285,85" />

        <!-- Eyeglasses (Rectangular Clear Frames) -->
        <rect x="175" y="174" width="44" height="32" rx="4" fill="none" stroke="#89CFF0" stroke-width="1.8" />
        <rect x="231" y="174" width="44" height="32" rx="4" fill="none" stroke="#89CFF0" stroke-width="1.8" />
        <path class="contour-line" d="M 219,182 L 231,182" stroke-width="2.2" />
        <!-- Reflections -->
        <path d="M 178,178 L 190,198 M 234,178 L 246,198" stroke="#F8FAFC" stroke-width="1.2" stroke-linecap="round" opacity="0.3" />

        <!-- Eyes (Looking down-left) -->
        <path class="contour-line contour-secondary" d="M 185,190 C 190,187 200,187 205,190 M 187,190 C 192,194 198,194 203,190" />
        <path class="contour-line contour-secondary" d="M 241,190 C 246,187 256,187 261,190 M 243,190 C 248,194 254,194 259,190" />
        <circle cx="196" cy="190" r="1.8" fill="#F8FAFC" />
        <circle cx="252" cy="190" r="1.8" fill="#F8FAFC" />
        <!-- Eyebrows -->
        <path class="contour-line" d="M 180,180 Q 195,174 208,181" stroke-width="1.5" />
        <path class="contour-line" d="M 238,181 Q 251,174 266,180" stroke-width="1.5" />

        <!-- Nose -->
        <path class="contour-line contour-primary" d="M 223,185 L 223,222 Q 223,227 218,226" />
        <path class="contour-line contour-secondary" d="M 226,223 Q 229,222 227,225" />

        <!-- Lips (Serious expression) -->
        <path class="contour-line contour-primary" d="M 207,242 Q 222,238 239,241" />
        <path class="contour-line contour-secondary" d="M 212,246 Q 222,249 233,246" />

        <!-- Stubble, Mustache & Chinstrap Beard -->
        <path class="contour-line contour-stubble" d="M 172,215 C 172,255 192,296 222,296 C 252,296 272,255 272,215" />
        <path class="contour-line contour-stubble" d="M 206,236 Q 222,231 238,236" />
        <path class="contour-line contour-stubble" d="M 217,258 Q 222,260 227,258" />

        <!-- Neck -->
        <path class="contour-line contour-secondary" d="M 194,288 L 194,305 M 250,288 L 250,305" />

        <!-- Gold Chain Highlight -->
        <path d="M 208,318 C 213,326 229,326 234,318" stroke="#F59E0B" stroke-width="1.0" fill="none" opacity="0.8" />

        <!-- V-Neck Striped Collared Shirt -->
        <path class="contour-line contour-primary fill-dark" d="M 194,302 L 174,342 L 208,352 L 222,320 L 236,352 L 270,342 L 250,302 Z" />
        <path class="contour-line contour-secondary" d="M 210,302 L 222,320 L 234,302" />
        <path class="contour-line contour-primary fill-panel" d="M 155,342 C 130,360 106,400 106,415 L 338,415 C 338,400 314,360 289,342 Z" />
        
        <!-- Vertical Stripes on Shirt -->
        <line class="contour-line contour-secondary" x1="140" y1="365" x2="130" y2="415" stroke-dasharray="3 3" />
        <line class="contour-line contour-secondary" x1="175" y1="350" x2="170" y2="415" stroke-dasharray="3 3" />
        <line class="contour-line contour-secondary" x1="205" y1="355" x2="205" y2="415" stroke-dasharray="3 3" />
        <line class="contour-line contour-secondary" x1="239" y1="355" x2="239" y2="415" stroke-dasharray="3 3" />
        <line class="contour-line contour-secondary" x1="269" y1="350" x2="274" y2="415" stroke-dasharray="3 3" />
        <line class="contour-line contour-secondary" x1="304" y1="365" x2="314" y2="415" stroke-dasharray="3 3" />

        <!-- Crossed Arms -->
        <path class="contour-line contour-primary fill-panel" d="M 96,405 C 96,405 146,370 222,370 C 298,370 348,405 348,405 L 338,438 L 106,438 Z" />
        <path class="contour-line contour-primary" d="M 104,412 C 156,388 216,388 256,402" />
        <path class="contour-line contour-primary" d="M 338,412 C 286,388 226,388 186,402" />
        <path class="contour-line contour-secondary" d="M 126,425 Q 222,405 318,425" />
      </g>
    </g>

    <!-- ================= RIGHT SIDE: TERMINAL SPECS ================= -->
    <g transform="translate(560, 80)" class="font-mono">
      <!-- Title header -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.3s" fill="freeze" />
        <text x="0" y="10" class="header-text">nagaraju@flow-os</text>
      </g>

      <!-- Separator line -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.4s" fill="freeze" />
        <text x="0" y="24" class="separator">──────────────────────────────────────────────────────────────────</text>
      </g>

      <!-- Specifications logs with staggered reveals -->
      <!-- OS -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.5s" fill="freeze" />
        <text x="0" y="44">OS: <tspan class="console-dots">...............................</tspan> <tspan class="console-val">macOS Sonoma</tspan></text>
      </g>

      <!-- Uptime -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.6s" fill="freeze" />
        <text x="0" y="58">Uptime: <tspan class="console-dots">...........................</tspan> <tspan class="console-val">3 years, 8 months, 12 days</tspan></text>
      </g>

      <!-- Host -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.7s" fill="freeze" />
        <text x="0" y="72">Host: <tspan class="console-dots">.............................</tspan> <tspan class="console-val">Kalasalingam SPE</tspan></text>
      </g>

      <!-- Kernel -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.8s" fill="freeze" />
        <text x="0" y="86">Kernel: <tspan class="console-dots">...........................</tspan> <tspan class="console-val-success">FLOW Core v0.9.0 (Cognitive OS)</tspan></text>
      </g>

      <!-- IDEs -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.9s" fill="freeze" />
        <text x="0" y="100">IDEs: <tspan class="console-dots">.............................</tspan> <tspan class="console-val">VS Code, Cursor, Antigravity IDE</tspan></text>
      </g>

      <!-- Focus -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.0s" fill="freeze" />
        <text x="0" y="114">Focus: <tspan class="console-dots">............................</tspan> <tspan class="console-val-highlight">AI Systems &amp; Distributed Architectures</tspan></text>
      </g>

      <!-- Languages Programming -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.1s" fill="freeze" />
        <text x="0" y="128">Languages.Programming: <tspan class="console-dots">............</tspan> <tspan class="console-val">Python, TypeScript, JavaScript</tspan></text>
      </g>

      <!-- Languages Computer -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.2s" fill="freeze" />
        <text x="0" y="142">Languages.Computer: <tspan class="console-dots">...............</tspan> <tspan class="console-val">SQL, HTML, CSS, JSON, Markdown</tspan></text>
      </g>

      <!-- Database -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.3s" fill="freeze" />
        <text x="0" y="156">Database: <tspan class="console-dots">.........................</tspan> <tspan class="console-val">PostgreSQL, Supabase PgVector, Redis</tspan></text>
      </g>

      <!-- Hobbies Software -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.4s" fill="freeze" />
        <text x="0" y="170">Hobbies.Software: <tspan class="console-dots">.................</tspan> <tspan class="console-val">Multi-Agent AI, Hybrid RAG, Graph DBs</tspan></text>
      </g>

      <!-- Hobbies Hardware -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.5s" fill="freeze" />
        <text x="0" y="184">Hobbies.Hardware: <tspan class="console-dots">.................</tspan> <tspan class="console-val">Distributed Worker Telemetry Systems</tspan></text>
      </g>

      <!-- Separator Contact -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.6s" fill="freeze" />
        <text x="0" y="206" class="separator">─ Contact ────────────────────────────────────────────────────────</text>
      </g>

      <!-- Email -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.7s" fill="freeze" />
        <text x="0" y="226">Email.Personal: <tspan class="console-dots">...................</tspan> <tspan class="console-val">kishorevarmaspe@gmail.com</tspan></text>
      </g>

      <!-- GitHub -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.8s" fill="freeze" />
        <text x="0" y="240">GitHub: <tspan class="console-dots">...........................</tspan> <tspan class="console-val-highlight">github.com/NKishoreVarma</tspan></text>
      </g>

      <!-- LinkedIn -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.9s" fill="freeze" />
        <text x="0" y="254">LinkedIn: <tspan class="console-dots">.........................</tspan> <tspan class="console-val-highlight">linkedin.com/in/NKishoreVarma</tspan></text>
      </g>

      <!-- Twitter -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.0s" fill="freeze" />
        <text x="0" y="268">Twitter: <tspan class="console-dots">..........................</tspan> <tspan class="console-val-highlight">twitter.com/NKishoreVarma</tspan></text>
      </g>

      <!-- Separator GitHub Stats -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.1s" fill="freeze" />
        <text x="0" y="290" class="separator">─ Current Build &amp; GitHub Stats ──────────────────────────────────</text>
      </g>

      <!-- Current Build -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.2s" fill="freeze" />
        <text x="0" y="310">Current Build: <tspan class="console-dots">....................</tspan> <tspan class="console-val-success">FLOW OS (v0.9.0, 90% Complete)</tspan></text>
      </g>

      <!-- Architecture -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.3s" fill="freeze" />
        <text x="0" y="324">Architecture: <tspan class="console-dots">.....................</tspan> <tspan class="console-val">Multi-Agent Cognition, Semantic Cache</tspan></text>
      </g>

      <!-- Security -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.4s" fill="freeze" />
        <text x="0" y="338">Security: <tspan class="console-dots">.........................</tspan> <tspan class="console-val-success">Role-Based Semantic Transaction Gate</tspan></text>
      </g>

      <!-- Repos -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.5s" fill="freeze" />
        <text x="0" y="352">Repos.Total: <tspan class="console-dots">......................</tspan> <tspan class="console-val">95 {Contributed: 133}</tspan></text>
      </g>

      <!-- Commits -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.6s" fill="freeze" />
        <text x="0" y="366">Commits: <tspan class="console-dots">..........................</tspan> <tspan class="console-val">2,116</tspan></text>
      </g>

      <!-- Followers -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.7s" fill="freeze" />
        <text x="0" y="380">Followers: <tspan class="console-dots">........................</tspan> <tspan class="console-val">196</tspan></text>
      </g>

      <!-- Blinking Terminal Cursor -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.8s" fill="freeze" />
        <!-- Positioned at the end of the last line -->
        <rect x="180" y="370" width="8" height="13" fill="#5DADE2">
          <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite" />
        </rect>
      </g>
    </g>
  </g>

  <!-- Outer Border Frame -->
  <rect x="0.5" y="0.5" width="1179" height="609" rx="16" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
</svg>
