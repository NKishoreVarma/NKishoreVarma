<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" viewBox="0 0 1180 610">
  <defs>
    <!-- Terminal Window Fade In Mask (Subtle startup reveal) -->
    <mask id="terminalReveal">
      <rect x="0" y="0" width="1180" height="610" fill="#ffffff" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.6s" begin="0.1s" fill="freeze" />
      </rect>
    </mask>
  </defs>

  <style>
    .font-mono { font-family: "SF Mono", "Fira Code", Consolas, Menlo, monospace; }
    
    /* Plain flat terminal styling */
    .term-bg { fill: #050816; }
    .header-text { fill: #E2E8F0; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; }
    
    /* Console specifications text */
    .console-row { font-size: 11px; fill: #94A3B8; font-weight: 500; }
    .console-dots { fill: #334155; font-weight: 400; }
    .console-val { fill: #F8FAFC; font-weight: 500; }
    .console-val-highlight { fill: #22D3EE; font-weight: 700; }
    .separator { fill: #334155; font-size: 11px; font-weight: 400; }
  </style>

  <!-- Background Base -->
  <rect width="100%" height="100%" class="term-bg" rx="16" />

  <!-- Terminal Window Content -->
  <g mask="url(#terminalReveal)">
    <!-- Flat Mac Window Controls -->
    <g transform="translate(30, 20)">
      <circle cx="10" cy="15" r="5" fill="#EF4444" opacity="0.85" />
      <circle cx="26" cy="15" r="5" fill="#F59E0B" opacity="0.85" />
      <circle cx="42" cy="15" r="5" fill="#10B981" opacity="0.85" />
    </g>
    
    <!-- Window Title -->
    <text x="590" y="38" fill="#475569" class="font-mono" font-size="11" text-anchor="middle">nagaraju@flow-os: ~</text>
    <line x1="30" y1="52" x2="1150" y2="52" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" />

    <!-- ================= LEFT SIDE: RAW FLAT ASCII PORTRAIT ================= -->
    <g transform="translate(35, 75)" fill="#E2E8F0" class="font-mono" font-size="7.5" letter-spacing="0.9" xml:space="preserve">
      <text x="0" y="12">                  ':-=rxxxxxxxxr=-:'                  </text>
      <text x="0" y="23.2">                :-+**rcxxxxxxxxcr**+-:                </text>
      <text x="0" y="34.4">             '-+*rcxxxxxxxxxxxxxxxxcr*+-'             </text>
      <text x="0" y="45.599999999999994">            :+rcxxxxXXXxxxxxxxxxxxxxxxcr+:            </text>
      <text x="0" y="56.8">          '-*ccxxXO##XxxxxxxxxXXXXXXXxxxc*-'          </text>
      <text x="0" y="68.0">         :+rccxOO#WWWWWW####OXXXXXXXXXXXxcr+:         </text>
      <text x="0" y="79.2">        :*cxO@WWWWWWWWWWWWWWWWOxXXXXXXXXXXxc*-        </text>
      <text x="0" y="90.4">       -+xx#WWWW@WWWWWWWWWWWWWWOW@OXXOXXXXXXc*-       </text>
      <text x="0" y="101.60000000000001">      -rO@@WWWWW@WWWWW@#WWWWWWWWWWWW@#OXxXXXXx*-      </text>
      <text x="0" y="112.80000000000001">     :rO@@WWWWWWWWWWWWWWWWWWWWWWOX#WWWWWW#OOOXx+'     </text>
      <text x="0" y="124.00000000000001">     +X@@WWWWWWWWWWWWW@x@WWWWWWWWWWO@WWWWWWW#@Xc-     </text>
      <text x="0" y="135.20000000000002">    :rX@WWWWWWWWWWWWWWXOWWWWWO@WWWWWW@@WWWWWW#OX*:    </text>
      <text x="0" y="146.4">    +X@@WWWWWWWOOWWWWWWWWWWWWOWWWWWWWWWWWWWWWW@Ox=    </text>
      <text x="0" y="157.6">   :r#@WOWWWWWWWWWWWW#OWWWWWWWWWWWWWWWWWOWWWWWW@Or:   </text>
      <text x="0" y="168.79999999999998">   +X#OWWWWWWWWWWWWWWx+OXWWXWWWWWxrxWWWWWWWWWWW@#X+   </text>
      <text x="0" y="179.99999999999997">   r#@WWWWWWO@WW@xWWW@=OWW=OOOxcx==+xWWWWWWW@@W#OOr   </text>
      <text x="0" y="191.19999999999996">  -x#@WWWWWWWWOW#=xWr  == :X**-.'-=*xcWWWWWWWW@W@#x-  </text>
      <text x="0" y="202.39999999999995">  -x@@WWWWWWWWWOrOWxr=    :-:.    .'+rWWWWWWWWWW@@x-  </text>
      <text x="0" y="213.59999999999994">  -x@@WWWWWWWWWWOWOrWWW##O*r=     .-OWWWWWWWWWWW@@x-  </text>
      <text x="0" y="224.79999999999993">  -x@@WXXWWWW@OOX*  '-=+---xW*:   -+*rcW##WWWWWW@@x-  </text>
      <text x="0" y="235.99999999999991">  -x@@W   =#WW+-OWr'.'  .=='=cr:.*- +rcxXX@#WWWW@@x-  </text>
      <text x="0" y="247.1999999999999">  -x#@W+    c#*-:--+r=         *+x#.':+X#Wx#WWWW@#x-  </text>
      <text x="0" y="258.3999999999999">   r#@WW-. ..#x+:             :'  c'.'xW#cXWWWWW@#r   </text>
      <text x="0" y="269.5999999999999">   +X@@WWX=--xO*+-.           '   =*:+#@O#WWWWW@@X+   </text>
      <text x="0" y="280.7999999999999">   :r#@WWWWWW+Oc*+-.               +=WWWWWWWWWW@#r:   </text>
      <text x="0" y="291.9999999999999">    +X@@WWWWWrcx+==-:..     .. ..-cr#WWWWWWWWW@@X+    </text>
      <text x="0" y="303.1999999999999">    :r#@WWWWWX-Or----:'.'---:-+*-rx@WWWWWWWWWW@#r:    </text>
      <text x="0" y="314.39999999999986">     +X@@WWW+r==Xx+---:'-:''' .':=+WWWWWWWWWW@@X+     </text>
      <text x="0" y="325.59999999999985">     :rO@@O  r+--c#x+=--:'':-:-*++':WWWWWWWW@@Or:     </text>
      <text x="0" y="336.79999999999984">      =cOO  =**=-'+X#@#r-''..'+*=x:  -rx#WW@@Oc=      </text>
      <text x="0" y="347.99999999999983">       '.  *+-*+-::-=*xO@Oxc+*rxWX+       :*cr=       </text>
      <text x="0" y="359.1999999999998">           -::=*+=---:':+x#W@@#x*:-                   </text>
      <text x="0" y="370.3999999999998">           ''':=++=-------::-----=*.                  </text>
      <text x="0" y="381.5999999999998">            ''-===+---:::::-==+++=+                   </text>
      <text x="0" y="392.7999999999998">            ':-==-:::::':::----:':.                   </text>
      <text x="0" y="403.9999999999998">              ..''..'::::''::::':'                    </text>
      <text x="0" y="415.19999999999976">                  .......'..''::.                     </text>
      <text x="0" y="426.39999999999975">                      ......'''.                      </text>
    </g>

    <!-- ================= RIGHT SIDE: FLAT TERMINAL SPECS ================= -->
    <g transform="translate(560, 80)" class="font-mono">
      <!-- Title header -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.2s" fill="freeze" />
        <text x="0" y="10" class="header-text">nagaraju@flow-os</text>
      </g>

      <!-- Separator line -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.3s" fill="freeze" />
        <text x="0" y="24" class="separator">──────────────────────────────────────────────────────────────────</text>
      </g>

      <!-- OS -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="0.4s" fill="freeze" />
        <text x="0" y="44">OS: <tspan class="console-dots">...............................</tspan> <tspan class="console-val">macOS Sonoma</tspan></text>
      </g>

      <!-- Uptime -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="0.45s" fill="freeze" />
        <text x="0" y="58">Uptime: <tspan class="console-dots">...........................</tspan> <tspan class="console-val">3 years, 8 months, 12 days</tspan></text>
      </g>

      <!-- Host -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="0.5s" fill="freeze" />
        <text x="0" y="72">Host: <tspan class="console-dots">.............................</tspan> <tspan class="console-val">Kalasalingam SPE</tspan></text>
      </g>

      <!-- Kernel -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="0.55s" fill="freeze" />
        <text x="0" y="86">Kernel: <tspan class="console-dots">...........................</tspan> <tspan class="console-val-highlight">FLOW Core v0.9.0 (Cognitive OS)</tspan></text>
      </g>

      <!-- IDEs -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="0.6s" fill="freeze" />
        <text x="0" y="100">IDEs: <tspan class="console-dots">.............................</tspan> <tspan class="console-val">VS Code, Cursor, Antigravity IDE</tspan></text>
      </g>

      <!-- Focus -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="0.65s" fill="freeze" />
        <text x="0" y="114">Focus: <tspan class="console-dots">............................</tspan> <tspan class="console-val-highlight">AI Systems &amp; Distributed Architectures</tspan></text>
      </g>

      <!-- Languages Programming -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="0.7s" fill="freeze" />
        <text x="0" y="128">Languages.Programming: <tspan class="console-dots">............</tspan> <tspan class="console-val">Python, TypeScript, JavaScript</tspan></text>
      </g>

      <!-- Languages Computer -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="0.75s" fill="freeze" />
        <text x="0" y="142">Languages.Computer: <tspan class="console-dots">...............</tspan> <tspan class="console-val">SQL, HTML, CSS, JSON, Markdown</tspan></text>
      </g>

      <!-- Database -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="0.8s" fill="freeze" />
        <text x="0" y="156">Database: <tspan class="console-dots">.........................</tspan> <tspan class="console-val">PostgreSQL, Supabase PgVector, Redis</tspan></text>
      </g>

      <!-- Hobbies Software -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="0.85s" fill="freeze" />
        <text x="0" y="170">Hobbies.Software: <tspan class="console-dots">.................</tspan> <tspan class="console-val">Multi-Agent AI, Hybrid RAG, Graph DBs</tspan></text>
      </g>

      <!-- Hobbies Hardware -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="0.9s" fill="freeze" />
        <text x="0" y="184">Hobbies.Hardware: <tspan class="console-dots">.................</tspan> <tspan class="console-val">Distributed Worker Telemetry Systems</tspan></text>
      </g>

      <!-- Separator Contact -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.95s" fill="freeze" />
        <text x="0" y="206" class="separator">─ Contact ────────────────────────────────────────────────────────</text>
      </g>

      <!-- Email -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="1.0s" fill="freeze" />
        <text x="0" y="226">Email.Personal: <tspan class="console-dots">...................</tspan> <tspan class="console-val">kishorevarmaspe@gmail.com</tspan></text>
      </g>

      <!-- GitHub -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="1.05s" fill="freeze" />
        <text x="0" y="240">GitHub: <tspan class="console-dots">...........................</tspan> <tspan class="console-val-highlight">github.com/NKishoreVarma</tspan></text>
      </g>

      <!-- LinkedIn -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="1.1s" fill="freeze" />
        <text x="0" y="254">LinkedIn: <tspan class="console-dots">.........................</tspan> <tspan class="console-val-highlight">linkedin.com/in/NKishoreVarma</tspan></text>
      </g>

      <!-- Twitter -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="1.15s" fill="freeze" />
        <text x="0" y="268">Twitter: <tspan class="console-dots">..........................</tspan> <tspan class="console-val-highlight">twitter.com/NKishoreVarma</tspan></text>
      </g>

      <!-- Separator GitHub Stats -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.2s" fill="freeze" />
        <text x="0" y="290" class="separator">─ Current Build &amp; GitHub Stats ──────────────────────────────────</text>
      </g>

      <!-- Current Build -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="1.25s" fill="freeze" />
        <text x="0" y="310">Current Build: <tspan class="console-dots">....................</tspan> <tspan class="console-val-success">FLOW OS (v0.9.0, 90% Complete)</tspan></text>
      </g>

      <!-- Architecture -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="1.3s" fill="freeze" />
        <text x="0" y="324">Architecture: <tspan class="console-dots">.....................</tspan> <tspan class="console-val">Multi-Agent Cognition, Semantic Cache</tspan></text>
      </g>

      <!-- Security -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="1.35s" fill="freeze" />
        <text x="0" y="338">Security: <tspan class="console-dots">.........................</tspan> <tspan class="console-val-success">Role-Based Semantic Transaction Gate</tspan></text>
      </g>

      <!-- Repos -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="1.4s" fill="freeze" />
        <text x="0" y="352">Repos.Total: <tspan class="console-dots">......................</tspan> <tspan class="console-val">95 {Contributed: 133}</tspan></text>
      </g>

      <!-- Commits -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="1.45s" fill="freeze" />
        <text x="0" y="366">Commits: <tspan class="console-dots">..........................</tspan> <tspan class="console-val">2,116</tspan></text>
      </g>

      <!-- Followers -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.15s" begin="1.5s" fill="freeze" />
        <text x="0" y="380">Followers: <tspan class="console-dots">........................</tspan> <tspan class="console-val">196</tspan></text>
      </g>

      <!-- Blinking Terminal Cursor -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.6s" fill="freeze" />
        <rect x="180" y="370" width="8" height="13" fill="#22D3EE">
          <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite" />
        </rect>
      </g>
    </g>
  </g>

  <!-- Outer Border Frame -->
  <rect x="0.5" y="0.5" width="1179" height="609" rx="16" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
</svg>
