<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" viewBox="0 0 1180 610">
  <defs>
    <!-- Background Base Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#050a18" />
    </linearGradient>

    <!-- Subtle Radial Glow behind ASCII -->
    <radialGradient id="asciiGlow" cx="20%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0" />
    </radialGradient>

    <!-- ASCII Cyber Gradient (Ice Blue -> Soft Cyan -> White) -->
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="60%" stop-color="#67E8F9" />
      <stop offset="100%" stop-color="#F8FAFC" />
      <animate attributeName="x1" values="0%;100%;0%" dur="12s" repeatCount="indefinite" />
      <animate attributeName="y1" values="0%;100%;0%" dur="12s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Standard Glow Filter (Subtle) -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Reveal Mask for ASCII line-by-line reveal -->
    <mask id="asciiRevealMask">
      <rect x="0" y="0" width="1180" height="0" fill="#ffffff">
        <animate attributeName="height" to="610" dur="2.4s" begin="0.2s" fill="freeze" keyTimes="0;1" calcMode="spline" keySplines="0.1 0.8 0.2 1" />
      </rect>
    </mask>

    <!-- Terminal Window Fade In Mask -->
    <mask id="terminalReveal">
      <rect x="0" y="0" width="1180" height="610" fill="#ffffff" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.8s" begin="0.1s" fill="freeze" />
      </rect>
    </mask>
  </defs>

  <style>
    .font-mono { font-family: "SF Mono", "Fira Code", Consolas, Menlo, monospace; }
    
    /* Terminal styles matching andrew@grant screen */
    .term-bg { fill: #020617; }
    .term-border { fill: none; stroke: rgba(255, 255, 255, 0.08); stroke-width: 1.5; }
    .header-text { fill: #38BDF8; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; }
    
    /* Console key-value rows */
    .console-row { font-size: 11px; fill: #94A3B8; font-weight: 500; }
    .console-row-sub { font-size: 11px; fill: #60A5FA; font-weight: 700; }
    .console-dots { fill: #334155; font-weight: 400; }
    .console-val { fill: #F8FAFC; font-weight: 500; }
    .console-val-success { fill: #14B8A6; font-weight: 700; }
    .console-val-highlight { fill: #38BDF8; font-weight: 700; }
    .separator { fill: #334155; font-size: 11px; font-weight: 400; }
  </style>

  <!-- ================= BACKGROUND LAYOUT ================= -->
  <!-- Base background rect -->
  <rect width="100%" height="100%" class="term-bg" rx="16" />

  <!-- Subtle Glow for ASCII -->
  <circle cx="210" cy="300" r="280" fill="url(#asciiGlow)" />

  <!-- Terminal Window Content Container -->
  <g mask="url(#terminalReveal)">
    <!-- Mac Window Controls -->
    <g transform="translate(30, 20)">
      <circle cx="10" cy="15" r="5" fill="#EF4444" />
      <circle cx="26" cy="15" r="5" fill="#F59E0B" />
      <circle cx="42" cy="15" r="5" fill="#14B8A6" />
    </g>
    
    <!-- Window Title in Center -->
    <text x="590" y="38" fill="#475569" class="font-mono" font-size="11" text-anchor="middle">nagaraju@flow-os: ~</text>
    <line x1="30" y1="52" x2="1150" y2="52" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" />

    <!-- ================= LEFT SIDE: HD PORTRAIT ================= -->
    <g transform="translate(35, 75)" mask="url(#asciiRevealMask)">
      <!-- Floating motion -->
      <g transform="translate(0, 0)">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="6s" repeatCount="indefinite" />
        
        <g fill="url(#cyberGrad)" class="font-mono" font-size="7.5" letter-spacing="0.9">
          <text x="0" y="10">========================================================================</text>
          <text x="0" y="20">========================================================================</text>
          <text x="0" y="30">========================================================================</text>
          <text x="0" y="40">========================================================================</text>
          <text x="0" y="50">===========================::===========================================</text>
          <text x="0" y="60">====================++=-.   '-==-=====+===-=============================</text>
          <text x="0" y="70">=================+=-'                ..:---------=====----------------=-</text>
          <text x="0" y="80">=============--=-'                      :r:===----=-=-------------------</text>
          <text x="0" y="90">==-=====-=-==--=      ''       .         '   '--------------------------</text>
          <text x="0" y="100">---------:''                  .'                .':-==------------------</text>
          <text x="0" y="110">-------:' .                               ='='       ''::::-------------</text>
          <text x="0" y="120">-------'                       =:             '-         '.'::-:::::::::</text>
          <text x="0" y="130">-------   '                   *=       ..        '         '':::::::::::</text>
          <text x="0" y="140">::::::               -+.              =*                    ''''''''''''</text>
          <text x="0" y="150">:::::'               .                               .  .    '.'''.'''''</text>
          <text x="0" y="160">''''''   .. :.              'Xr.                     :        . .  .....</text>
          <text x="0" y="170">......   '        .          rx+=- +*      '#OX=              ''.       </text>
          <text x="0" y="180">..  .            : .   +r    r#'  r@'+*=rOxxXxc*=:        :.''''.       </text>
          <text x="0" y="190">                   .:''rx: =███████X=cxc███@#Ox*+*                      </text>
          <text x="0" y="200">                     :*+  +r+#█████@#█@████████Ox*                      </text>
          <text x="0" y="210">                      '- +r    .'.=x*x████████@*                        </text>
          <text x="0" y="220">           -:      '''-*#██@OxcrxXOX+ -O█████Ocrcrr  :.                 </text>
          <text x="0" y="230">          -███x=   -xX= +X████████XO█X++r#█@X██#*r+=-=-                 </text>
          <text x="0" y="240">          .██████: *x##*r*c*cx███@@█████@xrr''██OOx+-' :*               </text>
          <text x="0" y="250">           =██████=:cO@█████#████████████O██O-████r . 'r                </text>
          <text x="0" y="260">            'x████*.*xX#████████████████O████*X█@#: :rc                 </text>
          <text x="0" y="270">               -==X:-cxx#█████████████████████*XX-                      </text>
          <text x="0" y="280">                  cr-*cxx#████████████████████O#+                       </text>
          <text x="0" y="290">                  .O==xOOXO@@█████████@@█@@#r:+'                        </text>
          <text x="0" y="300">                   OX:+XOOO##@███XXXX@##XcOO**-                         </text>
          <text x="0" y="310">                 xXr#O=:rO#OOO@█##█████████#Ox'                         </text>
          <text x="0" y="320">               r██#*O##r::+xOO###@██@#@█#xxXx@█                         </text>
          <text x="0" y="330">              O███rcxO#@#r:.':+x#@@███@#c+xO=███x*:'                    </text>
          <text x="0" y="340">           '+#██ccOxcXO#@#OXr-..'=cX#@█#Xx+ =X████████Or-               </text>
          <text x="0" y="350">       'c███████x##OcxxO#####@@O*'       .'+#O██████████████#r:      .':</text>
          <text x="0" y="360">    +@██████████#@@#OxxxX##OO####OOXxcrrcX@@OO#███████████████████X*=:.'</text>
          <text x="0" y="370">:x█████████████████@#XXOxX##OOOOOO#█@OOOXxxcxc#████████████████████████x</text>
          <text x="0" y="380">█████████████████##OXxXOOX#@##███@@@OXXXXXXO#O██████████████████████████</text>
          <text x="0" y="390">█████████████████XxxXXO##█@@@#@@##@@@####@@█@███████████████████████████</text>
          <text x="0" y="400">█████████████████████@@█████@@@@@███@@@@@@@@████████████████████████████</text>
        </g>

        <!-- Subtle scanner line sweep -->
        <line x1="0" y1="0" x2="360" y2="0" stroke="#38BDF8" stroke-width="1" filter="url(#glow)" opacity="0">
          <animate attributeName="y1" values="0;400" dur="4s" repeatCount="indefinite" />
          <animate attributeName="y2" values="0;400" dur="4s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.1;0.9;1" dur="4s" repeatCount="indefinite" />
        </line>
      </g>
    </g>

    <!-- ================= RIGHT SIDE: TERMINAL SPECS ================= -->
    <g transform="translate(560, 80)" class="font-mono">
      <!-- Title header -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.3s" fill="freeze" />
        <text x="0" y="10" class="header-text">nagaraju@flow-os</text>
      </g>

      <!-- Separator line -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.4s" fill="freeze" />
        <text x="0" y="24" class="separator">──────────────────────────────────────────────────────────────────</text>
      </g>

      <!-- Specifications logs with staggered reveals -->
      <!-- OS -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.5s" fill="freeze" />
        <text x="0" y="44">OS: <tspan class="console-dots">...............................</tspan> <tspan class="console-val">macOS Sonoma</tspan></text>
      </g>

      <!-- Uptime -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.6s" fill="freeze" />
        <text x="0" y="58">Uptime: <tspan class="console-dots">...........................</tspan> <tspan class="console-val">3 years, 8 months, 12 days</tspan></text>
      </g>

      <!-- Host -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.7s" fill="freeze" />
        <text x="0" y="72">Host: <tspan class="console-dots">.............................</tspan> <tspan class="console-val">Kalasalingam SPE</tspan></text>
      </g>

      <!-- Kernel -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.8s" fill="freeze" />
        <text x="0" y="86">Kernel: <tspan class="console-dots">...........................</tspan> <tspan class="console-val-success">FLOW Core v0.9.0 (Cognitive OS)</tspan></text>
      </g>

      <!-- IDEs -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="0.9s" fill="freeze" />
        <text x="0" y="100">IDEs: <tspan class="console-dots">.............................</tspan> <tspan class="console-val">VS Code, Cursor, Antigravity IDE</tspan></text>
      </g>

      <!-- Focus -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.0s" fill="freeze" />
        <text x="0" y="114">Focus: <tspan class="console-dots">............................</tspan> <tspan class="console-val-highlight">AI Systems &amp; Distributed Architectures</tspan></text>
      </g>

      <!-- Languages Programming -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.1s" fill="freeze" />
        <text x="0" y="128">Languages.Programming: <tspan class="console-dots">............</tspan> <tspan class="console-val">Python, TypeScript, JavaScript</tspan></text>
      </g>

      <!-- Languages Computer -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.2s" fill="freeze" />
        <text x="0" y="142">Languages.Computer: <tspan class="console-dots">...............</tspan> <tspan class="console-val">SQL, HTML, CSS, JSON, Markdown</tspan></text>
      </g>

      <!-- Database -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.3s" fill="freeze" />
        <text x="0" y="156">Database: <tspan class="console-dots">.........................</tspan> <tspan class="console-val">PostgreSQL, Supabase PgVector, Redis</tspan></text>
      </g>

      <!-- Hobbies Software -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.4s" fill="freeze" />
        <text x="0" y="170">Hobbies.Software: <tspan class="console-dots">.................</tspan> <tspan class="console-val">Multi-Agent AI, Hybrid RAG, Graph DBs</tspan></text>
      </g>

      <!-- Hobbies Hardware -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.5s" fill="freeze" />
        <text x="0" y="184">Hobbies.Hardware: <tspan class="console-dots">.................</tspan> <tspan class="console-val">Distributed Worker Telemetry Systems</tspan></text>
      </g>

      <!-- Separator Contact -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.6s" fill="freeze" />
        <text x="0" y="206" class="separator">─ Contact ────────────────────────────────────────────────────────</text>
      </g>

      <!-- Email -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.7s" fill="freeze" />
        <text x="0" y="226">Email.Personal: <tspan class="console-dots">...................</tspan> <tspan class="console-val">kishorevarmaspe@gmail.com</tspan></text>
      </g>

      <!-- GitHub -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.8s" fill="freeze" />
        <text x="0" y="240">GitHub: <tspan class="console-dots">...........................</tspan> <tspan class="console-val-highlight">github.com/NKishoreVarma</tspan></text>
      </g>

      <!-- LinkedIn -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="1.9s" fill="freeze" />
        <text x="0" y="254">LinkedIn: <tspan class="console-dots">.........................</tspan> <tspan class="console-val-highlight">linkedin.com/in/NKishoreVarma</tspan></text>
      </g>

      <!-- Twitter -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.0s" fill="freeze" />
        <text x="0" y="268">Twitter: <tspan class="console-dots">..........................</tspan> <tspan class="console-val-highlight">twitter.com/NKishoreVarma</tspan></text>
      </g>

      <!-- Separator GitHub Stats -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.1s" fill="freeze" />
        <text x="0" y="290" class="separator">─ Current Build &amp; GitHub Stats ──────────────────────────────────</text>
      </g>

      <!-- Current Build -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.2s" fill="freeze" />
        <text x="0" y="310">Current Build: <tspan class="console-dots">....................</tspan> <tspan class="console-val-success">FLOW OS (v0.9.0, 90% Complete)</tspan></text>
      </g>

      <!-- Architecture -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.3s" fill="freeze" />
        <text x="0" y="324">Architecture: <tspan class="console-dots">.....................</tspan> <tspan class="console-val">Multi-Agent Cognition, Semantic Cache</tspan></text>
      </g>

      <!-- Security -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.4s" fill="freeze" />
        <text x="0" y="338">Security: <tspan class="console-dots">.........................</tspan> <tspan class="console-val-success">Role-Based Semantic Transaction Gate</tspan></text>
      </g>

      <!-- Repos -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.5s" fill="freeze" />
        <text x="0" y="352">Repos.Total: <tspan class="console-dots">......................</tspan> <tspan class="console-val">95 {Contributed: 133}</tspan></text>
      </g>

      <!-- Commits -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.6s" fill="freeze" />
        <text x="0" y="366">Commits: <tspan class="console-dots">..........................</tspan> <tspan class="console-val">2,116</tspan></text>
      </g>

      <!-- Followers -->
      <g class="console-row" opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.7s" fill="freeze" />
        <text x="0" y="380">Followers: <tspan class="console-dots">........................</tspan> <tspan class="console-val">196</tspan></text>
      </g>

      <!-- Blinking Terminal Cursor -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.2s" begin="2.8s" fill="freeze" />
        <!-- Positioned at the end of the last line -->
        <rect x="180" y="370" width="8" height="13" fill="#38BDF8">
          <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite" />
        </rect>
      </g>
    </g>
  </g>

  <!-- Outer Border Frame -->
  <rect x="0.5" y="0.5" width="1179" height="609" rx="16" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
</svg>
