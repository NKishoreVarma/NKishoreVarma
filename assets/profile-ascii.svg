<svg xmlns="http://www.w3.org/2000/svg" width="450" height="450" viewBox="0 0 450 450">
  <defs>
    <!-- Soft Cyan -> Slate monochrome gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>

    <!-- Subtle dot shading pattern -->
    <pattern id="dotPattern" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.0" fill="#94A3B8" opacity="0.25" />
    </pattern>

    <!-- Scanline pattern overlay -->
    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#22D3EE" stroke-width="0.5" opacity="0.10" />
    </pattern>

    <!-- Ambient Glow behind head -->
    <radialGradient id="headGlow" cx="50%" cy="45%" r="42%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0" />
    </radialGradient>

    <!-- Reveal mask -->
    <mask id="revealMask">
      <rect x="0" y="0" width="450" height="450" fill="#ffffff" opacity="0">
        <animate attributeName="opacity" to="1" dur="1.2s" begin="0.1s" fill="freeze" />
      </rect>
    </mask>
  </defs>

  <style>
    .contour-line { fill: none; stroke: url(#cyanGrad); stroke-linecap: round; stroke-linejoin: round; }
    .contour-primary { stroke-width: 1.8; }
    .contour-secondary { stroke-width: 1.0; stroke: #94A3B8; opacity: 0.7; }
    .contour-stubble { stroke: #94A3B8; stroke-width: 1.2; stroke-dasharray: 2 3; opacity: 0.8; }
    .fill-dark { fill: #050816; }
    .fill-panel { fill: #0F172A; }
    .tech-text { font-family: "SF Mono", "Fira Code", Consolas, monospace; font-size: 8px; fill: #22D3EE; opacity: 0.6; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#050816" rx="12" />

  <!-- Grid overlay -->
  <g opacity="0.02">
    <path d="M 0 50 L 450 50 M 0 100 L 450 100 M 0 150 L 450 150 M 0 200 L 450 200 M 0 250 L 450 250 M 0 300 L 450 300 M 0 350 L 450 350 M 0 400 L 450 400" stroke="#ffffff" stroke-width="1" />
    <path d="M 50 0 L 50 450 M 100 0 L 100 450 M 150 0 L 150 450 M 200 0 L 200 450 M 250 0 L 250 450 M 300 0 L 300 450 M 350 0 L 350 450 M 400 0 L 400 450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Bounding Corner Brackets -->
  <g stroke="#22D3EE" stroke-width="1.2" opacity="0.4" fill="none">
    <path d="M 25 45 L 25 25 L 45 25" />
    <path d="M 405 25 L 425 25 L 425 45" />
    <path d="M 25 405 L 25 425 L 45 425" />
    <path d="M 405 425 L 425 425 L 425 405" />
  </g>

  <!-- Technical Labels -->
  <g class="tech-text">
    <text x="35" y="40">SYS.PORTRAIT // N.K.VARMA</text>
    <text x="35" y="415">LOC: 16.5000° N, 80.6400° E</text>
    <text x="415" y="40" text-anchor="end">STATUS: ACTIVE</text>
    <text x="415" y="415" text-anchor="end">OS: FLOW_OS_v0.9.0</text>
  </g>

  <!-- Portrait Graphic with reveal mask -->
  <g mask="url(#revealMask)">
    <!-- Ambient Glow behind Head -->
    <circle cx="225" cy="210" r="150" fill="url(#headGlow)" />

    <!-- Face Shape (Center-cropped, occupying 90% of area) -->
    <path class="contour-line contour-primary fill-panel" d="M 165,185 C 165,260 190,308 222,308 C 255,308 280,260 280,185 C 280,160 268,145 222,145 C 176,145 165,160 165,185 Z" />

    <!-- Dot Shading Shadow Areas (Subtle Halftone overlay) -->
    <!-- Jaw Shadow -->
    <path d="M 165,190 C 165,250 185,295 215,306 C 185,285 170,240 170,190 Z" fill="url(#dotPattern)" />
    <!-- Neck Shadow -->
    <path d="M 194,290 C 194,290 212,325 222,325 C 232,325 250,290 250,290 L 250,305 C 250,305 232,340 222,340 C 212,340 194,305 194,305 Z" fill="url(#dotPattern)" />

    <!-- Ears -->
    <path class="contour-line contour-secondary" d="M 165,188 C 158,188 156,202 163,208" />
    <path class="contour-line contour-secondary" d="M 280,188 C 287,188 289,202 282,208" />

    <!-- Volumetric Curly Hair Base -->
    <path class="contour-line contour-primary fill-dark" d="M 152,185 C 142,140 148,95 178,78 C 193,70 215,65 230,75 C 248,68 275,68 290,82 C 304,95 306,120 302,140 C 310,150 308,168 294,185 C 288,190 280,185 280,185 Z" />

    <!-- Hair Curvature Textures -->
    <path class="contour-line contour-secondary" d="M 160,150 C 170,120 190,110 210,130" />
    <path class="contour-line contour-secondary" d="M 180,130 C 195,100 220,105 235,135" />
    <path class="contour-line contour-secondary" d="M 240,110 C 255,85 280,100 290,130" />
    <path class="contour-line contour-secondary" d="M 175,90 C 200,75 230,80 250,95" />
    <path class="contour-line contour-secondary" d="M 220,70 C 245,60 270,68 285,85" />
    
    <!-- Forehead Curls falling onto forehead -->
    <path class="contour-line" d="M 215,120 Q 202,145 218,162 M 185,130 Q 172,155 188,168 M 245,125 Q 232,150 246,162 M 225,125 Q 218,145 228,152" stroke-width="1.5" />

    <!-- Eyeglasses (Rectangular Clear Frames, angled 3/4 view) -->
    <rect class="contour-line" x="160" y="176" width="52" height="34" rx="6" stroke="#22D3EE" stroke-width="2.0" fill="none" />
    <rect class="contour-line" x="228" y="176" width="46" height="34" rx="6" stroke="#22D3EE" stroke-width="2.0" fill="none" />
    <path class="contour-line" d="M 212,186 Q 220,183 228,186" stroke-width="2.5" />
    <!-- Reflections -->
    <path d="M 163,180 L 175,200 M 231,180 L 243,200" stroke="#F8FAFC" stroke-width="1.2" stroke-linecap="round" opacity="0.35" />
    <path class="contour-line contour-secondary" d="M 160,182 L 140,195 Q 138,196 142,202" />

    <!-- Eyes behind glasses (Looking down-left) -->
    <path class="contour-line contour-secondary" d="M 172,192 C 178,189 188,189 194,192 M 174,193 C 179,197 187,197 192,193" />
    <path class="contour-line contour-secondary" d="M 238,192 C 244,189 252,189 258,192 M 240,193 C 245,197 251,197 256,193" />
    <circle cx="184" cy="193" r="1.8" fill="#F8FAFC" />
    <circle cx="249" cy="193" r="1.8" fill="#F8FAFC" />
    <!-- Eyebrows -->
    <path class="contour-line" d="M 166,180 Q 182,173 198,181" stroke-width="1.6" />
    <path class="contour-line" d="M 232,181 Q 248,173 264,180" stroke-width="1.6" />

    <!-- Nose (Angle pointing down-right) -->
    <path class="contour-line contour-primary" d="M 221,186 L 221,226 Q 221,231 214,230" />
    <path class="contour-line contour-secondary" d="M 224,227 C 227,227 229,224 227,221" />

    <!-- Lips (Serious expression) -->
    <path class="contour-line contour-primary" d="M 202,250 Q 220,245 237,248" />
    <path class="contour-line contour-secondary" d="M 208,255 Q 220,259 231,255" />

    <!-- Beard Line & Mustache (Chinstrap beard up to ears) -->
    <path class="contour-line contour-stubble" d="M 148,206 C 148,255 174,306 215,306 C 255,306 284,255 284,206" />
    <path class="contour-line contour-stubble" d="M 200,243 Q 220,237 236,243" />
    <path class="contour-line contour-stubble" d="M 215,264 Q 220,266 225,264" />

    <!-- Neck -->
    <path class="contour-line contour-secondary" d="M 194,288 L 194,305 M 250,288 L 250,305" />

    <!-- Gold Chain Highlight -->
    <path d="M 208,318 C 213,326 229,326 234,318" stroke="#F59E0B" stroke-width="1.0" fill="none" opacity="0.8" />

    <!-- V-Neck Collared Striped Shirt -->
    <path class="contour-line contour-primary fill-dark" d="M 194,302 L 174,342 L 208,352 L 222,320 L 236,352 L 270,342 L 250,302 Z" />
    <path class="contour-line contour-secondary" d="M 210,302 L 222,320 L 234,302" />
    <path class="contour-line contour-primary fill-panel" d="M 155,342 C 130,360 106,400 106,415 L 338,415 C 338,400 314,360 289,342 Z" />
    
    <!-- Vertical Stripes on Shirt -->
    <line class="contour-line contour-secondary" x1="140" y1="365" x2="130" y2="415" stroke-dasharray="3 3" />
    <line class="contour-line contour-secondary" x1="175" y1="350" x2="170" y2="415" stroke-dasharray="3 3" />
    <line class="contour-line contour-secondary" x1="205" y1="355" x2="205" y2="415" stroke-dasharray="3 3" />
    <line class="contour-line contour-secondary" x1="239" y1="355" x2="239" y2="415" stroke-dasharray="3 3" />
    <line class="contour-line contour-secondary" x1="269" y1="350" x2="274" y2="415" stroke-dasharray="3 3" />
    <line class="contour-line contour-secondary" x1="304" y1="365" x2="314" y2="415" stroke-dasharray="3 3" />

    <!-- Crossed Arms base -->
    <path class="contour-line contour-primary fill-panel" d="M 96,405 C 96,405 146,370 222,370 C 298,370 348,405 348,405 L 338,438 L 106,438 Z" />
    <path class="contour-line contour-primary" d="M 104,412 C 156,388 216,388 256,402" />
    <path class="contour-line contour-primary" d="M 338,412 C 286,388 226,388 186,402" />
    <path class="contour-line contour-secondary" d="M 126,425 Q 222,405 318,425" />
  </g>

  <!-- Subtle Scanline Grid overlay (Strict monochrome terminal aesthetic) -->
  <rect x="25" y="25" width="400" height="400" fill="url(#scanlines)" pointer-events="none" rx="12" />

  <!-- Animated Scanner Sweep line -->
  <line x1="25" y1="25" x2="425" y2="25" stroke="#22D3EE" stroke-width="1.2" opacity="0.4" filter="url(#glow)">
    <animate attributeName="y1" values="25;425;25" dur="6s" repeatCount="indefinite" />
    <animate attributeName="y2" values="25;425;25" dur="6s" repeatCount="indefinite" />
  </line>

  <!-- Border Frame -->
  <rect x="0.5" y="0.5" width="449" height="449" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" rx="12" />
</svg>
