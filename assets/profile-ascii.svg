<svg xmlns="http://www.w3.org/2000/svg" width="450" height="450" viewBox="0 0 450 450">
  <defs>
    <!-- Sky Blue -> Soft Blue Glow -->
    <radialGradient id="faceGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0" />
    </radialGradient>

    <!-- Glass Reflection Gradient -->
    <linearGradient id="glassReflect" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="40%" stop-color="#38BDF8" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0" />
    </linearGradient>

    <!-- Accent Gradient for contours -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>

    <!-- Standard Glow Filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Reveal Mask for line-by-line reveal -->
    <mask id="vectorReveal">
      <rect x="0" y="0" width="450" height="0" fill="#ffffff">
        <animate attributeName="height" to="450" dur="2.2s" begin="0.2s" fill="freeze" keyTimes="0;1" calcMode="spline" keySplines="0.1 0.8 0.2 1" />
      </rect>
    </mask>
  </defs>

  <style>
    .tech-text { font-family: "SF Mono", "Fira Code", Consolas, monospace; font-size: 8px; fill: #60A5FA; opacity: 0.5; }
    .contour-line { fill: none; stroke: url(#accentGrad); stroke-linecap: round; stroke-linejoin: round; }
    .contour-primary { stroke-width: 1.5; }
    .contour-secondary { stroke-width: 1.0; opacity: 0.6; }
    .contour-stubble { stroke-width: 1.0; stroke-dasharray: 2 3; opacity: 0.5; }
    .fill-dark { fill: #020617; }
    .fill-panel { fill: #0F172A; }
  </style>

  <!-- Deep Navy Background -->
  <rect width="100%" height="100%" fill="#020617" rx="12" />

  <!-- Technical Grid Overlay (Subtle) -->
  <g opacity="0.04">
    <path d="M 0 50 L 450 50 M 0 100 L 450 100 M 0 150 L 450 150 M 0 200 L 450 200 M 0 250 L 450 250 M 0 300 L 450 300 M 0 350 L 450 350 M 0 400 L 450 400" stroke="#ffffff" stroke-width="0.5" />
    <path d="M 50 0 L 50 450 M 100 0 L 100 450 M 150 0 L 150 450 M 200 0 L 200 450 M 250 0 L 250 450 M 300 0 L 300 450 M 350 0 L 350 450 M 400 0 L 400 450" stroke="#ffffff" stroke-width="0.5" />
    <circle cx="225" cy="225" r="180" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="4 8" />
  </g>

  <!-- Bounding Target Vectors -->
  <g stroke="#38BDF8" stroke-width="1" opacity="0.3" fill="none">
    <!-- Top-Left Corner Bracket -->
    <path d="M 25 45 L 25 25 L 45 25" />
    <!-- Top-Right Corner Bracket -->
    <path d="M 405 25 L 425 25 L 425 45" />
    <!-- Bottom-Left Corner Bracket -->
    <path d="M 25 405 L 25 425 L 45 425" />
    <!-- Bottom-Right Corner Bracket -->
    <path d="M 405 425 L 425 425 L 425 405" />
  </g>

  <!-- Technical Labels -->
  <g class="tech-text">
    <text x="35" y="40">SYS.PORTRAIT // N.K.VARMA</text>
    <text x="35" y="415">LOC: 16.5000° N, 80.6400° E</text>
    <text x="415" y="40" text-anchor="end">STATUS: ACTIVE</text>
    <text x="415" y="415" text-anchor="end">OS: FLOW_OS_v0.9.0</text>
  </g>

  <!-- Radial glow behind head -->
  <circle cx="225" cy="210" r="140" fill="url(#faceGlow)" />

  <!-- Animated Vector Portrait Container -->
  <g mask="url(#vectorReveal)">
    <!-- Floating animation group -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="6s" repeatCount="indefinite" />

      <!-- ================= 1. JAW & SKIN PROFILE ================= -->
      <!-- Face shape matching user photo -->
      <path class="contour-line contour-primary fill-panel" d="M 165,185 C 165,255 190,305 225,305 C 260,305 285,255 285,185 C 285,160 270,145 225,145 C 180,145 165,160 165,185 Z" />

      <!-- Ear contours -->
      <path class="contour-line contour-secondary" d="M 165,190 C 158,190 155,205 163,212" />
      <path class="contour-line contour-secondary" d="M 285,190 C 292,190 295,205 287,212" />

      <!-- ================= 2. HAIRSTYLE (Voluminous Wavy Hair) ================= -->
      <!-- Massive wavy hair volume sweeping slightly right, matching user's photo -->
      <path class="contour-line contour-primary fill-dark" d="M 152,185 C 145,150 148,105 178,88 C 193,80 215,75 230,85 C 248,78 275,76 292,90 C 304,100 308,120 306,138 C 314,148 312,165 298,185 C 292,192 284,195 284,185 C 284,185 272,162 255,160 C 238,158 228,166 220,166 C 212,166 200,158 185,160 C 168,162 165,185 165,185 Z" />
      
      <!-- Inner wavy hair lines for high-fidelity curls -->
      <path class="contour-line contour-secondary" d="M 168,135 C 185,108 215,115 230,122" />
      <path class="contour-line contour-secondary" d="M 235,122 C 250,112 280,105 295,125" />
      <path class="contour-line contour-secondary" d="M 185,102 C 205,88 225,92 235,102" />
      <path class="contour-line contour-secondary" d="M 245,102 C 260,88 280,92 292,108" />

      <!-- ================= 3. SUNGLASSES ================= -->
      <!-- Stylish square-shaped dark sunglasses -->
      <!-- Left Lens -->
      <rect class="fill-dark" x="175" y="176" width="42" height="30" rx="5" stroke="#38BDF8" stroke-width="1.8" />
      <!-- Right Lens -->
      <rect class="fill-dark" x="233" y="176" width="42" height="30" rx="5" stroke="#38BDF8" stroke-width="1.8" />
      <!-- Bridge -->
      <path class="contour-line" d="M 217,184 L 233,184" stroke-width="2.5" />
      <!-- Lens glare highlights -->
      <path d="M 180,181 L 192,201" stroke="#F8FAFC" stroke-width="1.5" stroke-linecap="round" opacity="0.3" />
      <path d="M 238,181 L 250,201" stroke="#F8FAFC" stroke-width="1.5" stroke-linecap="round" opacity="0.3" />

      <!-- ================= 4. NOSE & FACIAL HAIR ================= -->
      <!-- Nose line -->
      <path class="contour-line contour-secondary" d="M 225,206 L 225,224 Q 225,227 221,227" />

      <!-- Mustache (matches user's photo) -->
      <path class="contour-line" d="M 205,238 Q 225,232 245,238 M 210,240 Q 225,235 240,240" stroke-width="1.5" />
      
      <!-- Closed mouth line -->
      <path class="contour-line contour-secondary" d="M 214,252 Q 225,255 236,252" />

      <!-- Jaw Stubble contour -->
      <path class="contour-line contour-stubble" d="M 175,220 C 175,255 195,290 225,290 C 255,290 275,255 275,220" />

      <!-- Neck outline -->
      <path class="contour-line contour-secondary" d="M 195,285 L 195,310 M 255,285 L 255,310" />

      <!-- ================= 5. STRIPED COLLAR SHIRT ================= -->
      <!-- V-neck collar outlines -->
      <path class="contour-line contour-primary fill-dark" d="M 192,305 L 175,345 L 210,355 L 225,325 L 240,355 L 275,345 L 258,305 Z" />
      <!-- Open neck inner skin chest line -->
      <path class="contour-line contour-secondary" d="M 212,305 L 225,325 L 238,305" />

      <!-- Shirt body shoulders -->
      <path class="contour-line contour-primary fill-panel" d="M 155,345 C 135,365 110,410 110,425 L 340,425 C 340,410 315,365 295,345 Z" />
      
      <!-- Vertical shirt stripes (using vertical dashed lines to resemble the striped shirt in photo) -->
      <line class="contour-line contour-secondary" x1="145" y1="365" x2="135" y2="425" stroke-dasharray="4 4" />
      <line class="contour-line contour-secondary" x1="180" y1="350" x2="175" y2="425" stroke-dasharray="4 4" />
      <line class="contour-line contour-secondary" x1="210" y1="357" x2="210" y2="425" stroke-dasharray="4 4" />
      <line class="contour-line contour-secondary" x1="240" y1="357" x2="240" y2="425" stroke-dasharray="4 4" />
      <line class="contour-line contour-secondary" x1="270" y1="350" x2="275" y2="425" stroke-dasharray="4 4" />
      <line class="contour-line contour-secondary" x1="305" y1="365" x2="315" y2="425" stroke-dasharray="4 4" />

      <!-- ================= 6. CROSSED ARMS ================= -->
      <!-- Folded arms posture (exact pose matching user's photo) -->
      <!-- Outer arms panel -->
      <path class="contour-line contour-primary fill-panel" d="M 100,415 C 100,415 150,380 225,380 C 300,380 350,415 350,415 L 340,448 L 110,448 Z" />
      <!-- Left arm fold crease -->
      <path class="contour-line contour-primary" d="M 108,422 C 160,398 220,398 260,412" />
      <!-- Right arm fold crease -->
      <path class="contour-line contour-primary" d="M 342,422 C 290,398 230,398 190,412" />
      <!-- Lower arm fold highlights -->
      <path class="contour-line contour-secondary" d="M 130,435 Q 225,415 320,435" />
    </g>
  </g>

  <!-- Border Frame -->
  <rect x="0.5" y="0.5" width="449" height="449" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" rx="12" />
</svg>
