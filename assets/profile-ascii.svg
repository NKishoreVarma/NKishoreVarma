<svg xmlns="http://www.w3.org/2000/svg" width="450" height="450" viewBox="0 0 450 450">
  <defs>
    <!-- Ice Blue -> Soft Cyan -> White highlights -->
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="60%" stop-color="#67E8F9" />
      <stop offset="100%" stop-color="#F8FAFC" />
      <animate attributeName="x1" values="0%;100%;0%" dur="12s" repeatCount="indefinite" />
      <animate attributeName="y1" values="0%;100%;0%" dur="12s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Scanner Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Reveal Mask for line-by-line typing reveal -->
    <mask id="revealMask">
      <rect x="0" y="0" width="450" height="0" fill="#ffffff">
        <animate attributeName="height" to="450" dur="2.5s" begin="0.2s" fill="freeze" keyTimes="0;1" calcMode="spline" keySplines="0.1 0.8 0.2 1" />
      </rect>
    </mask>
  </defs>

  <!-- Deep Navy Background -->
  <rect width="100%" height="100%" fill="#020617" rx="12" />

  <!-- Grid overlay -->
  <g opacity="0.02">
    <path d="M 0 50 L 450 50 M 0 100 L 450 100 M 0 150 L 450 150 M 0 200 L 450 200 M 0 250 L 450 250 M 0 300 L 450 300 M 0 350 L 450 350 M 0 400 L 450 400" stroke="#ffffff" stroke-width="1" />
    <path d="M 50 0 L 50 450 M 100 0 L 100 450 M 150 0 L 150 450 M 200 0 L 200 450 M 250 0 L 250 450 M 300 0 L 300 450 M 350 0 L 350 450 M 400 0 L 400 450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- ASCII Text Container (Ultra High Definition 72x40 - Web Safe) -->
  <g mask="url(#revealMask)" fill="url(#cyberGrad)" font-family="SF Mono, Fira Code, Consolas, monospace" font-size="7.2" letter-spacing="0.8">
    <g transform="translate(15, 20)">
      <animateTransform attributeName="transform" type="translate" values="15,20; 15,16; 15,20" dur="6s" repeatCount="indefinite" />
      
      <text x="0" y="10">                        '::-=rxxxxxxxxxxxxr=-::'                        </text>
      <text x="0" y="20">                      :-+***rcxxxxxxxxxxxxcr***+-:                      </text>
      <text x="0" y="30">                   :-+*rccxxxxxxxxxxxxxxxxxxxxxcr*+-:                   </text>
      <text x="0" y="40">                '-+*rcxxxxxxxxxxxxxxxxxxxxxxxxxxxxcr*+-'                </text>
      <text x="0" y="50">              '-+rcxxxxXXXO#XxxxxXxXXXXXXXXXXxXXXXxxxcr+-'              </text>
      <text x="0" y="60">             :+rcxxxxXX#WWWWW@##OXXXXXxxxXXXXXXXXXXXXXxcr+:             </text>
      <text x="0" y="70">           '-*cxxO#WWWWWWWWWWWWWWWWWWWWWOXXXXXXOXXXXXXXXxc*-'           </text>
      <text x="0" y="80">          :+rxx#WWWWWWWWWWWWWWWWWWWWWWWWWrO#OXXXXXXXXXXXXXxr+:          </text>
      <text x="0" y="90">         -*X@@@WWWWWWWXWWWWWWW#xWWWWW@WWWWWWWW@OOOOXXXXXXXXxc*-         </text>
      <text x="0" y="100">        =rO@@WWWWWWWWWWWWWWWWWWWWWWWWWWWWWOW#XWWWWW@#XXXXOOXXx*-        </text>
      <text x="0" y="110">       =cO@@WWWWWWWWWWWWWWWWXX@@WWWWWWWWWWWW@OWWWWWWWWWWW@###Xx*-       </text>
      <text x="0" y="120">      =cO@@WWWWWWWWWWWWWWWWWWWcx@WWWWWWW@WWWWWWO@WWWWWWWWWWWWOOxr-      </text>
      <text x="0" y="130">     :rO@@WWWWWWWWWWWXWWWWWWWW@WWWWWWW#c@WWWWWWWWWWWWWWWWWWW@##OX*:     </text>
      <text x="0" y="140">     +X@@WWWWWWWWWWW#@@WWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWW@WWWW#@#x=     </text>
      <text x="0" y="150">     r#@WW@XWWWWWWWWWWWWWWWWX*XWWWWWWWWWWWWWWWWWWWWWW@XWWWWWWWW@@Or     </text>
      <text x="0" y="160">    -x#@XWWWWWWWWWWWWWWWWWWW@-cxXXWxrWWWWWWW*=+rWWWWWWWWWWWWWWW@@#x-    </text>
      <text x="0" y="170">    +X@@WWWWWWWWO@@WWWXr#WWWW-+@WWx'#XxXx+*r==+*xO@WWWWWWWW#@W###OX+    </text>
      <text x="0" y="180">    r#@WWWWWWWWWWW@##Wx=cWW-   :'  +X*+*:. .:-=*ccxWWWWWWWWWWWWWW@#r    </text>
      <text x="0" y="190">   -x#@WWWWWWWWWWWWW#xc@WOrc*.     ::':        .+*xWWWWWWWWWWWWWW@#x-   </text>
      <text x="0" y="200">   -x@@WWWWWWWWWWWWWW@XW@+OWWWW@#@x+c*.       .=XWWWWWWWWWWWWWWWW@@x-   </text>
      <text x="0" y="210">   -x@@WWWr#WWWWWW##OOx=   ':=++---=cW#+:    '=***rcWWO#WWWWWWWWW@@x-   </text>
      <text x="0" y="220">   -x#@WW:   =cWWWO+=*W@c:       :=-.:rcc+ .+=  +rrcxXxO@@WWWWWWW@#x-   </text>
      <text x="0" y="230">    r#@WWX      xWc+:'-=++rr+:           :c+xWr .::*xO@WOrWWWWWWW@#r    </text>
      <text x="0" y="240">    +X@@WWr .  . c@r=-.     '            =   r* ..:XW@@xrWWWWWWW@@X+    </text>
      <text x="0" y="250">    -x#@WWWWc:. .*@x++='    .           :    .x-':+@@OcxWWWWWWWW@#x-    </text>
      <text x="0" y="260">     r#@WWWWWWWWW=xOc*+=:                     -r-rWWWWWWWWWWWWWW@#r     </text>
      <text x="0" y="270">     +X@@WWWWWWWWx=Xc*=+=-'.                 '==*WWWWWWWWWWWWWW@@X+     </text>
      <text x="0" y="280">     :rO@@WWWWWWWW-r#r=---::'.    .':'---+=-r#OWWWWWWWWWWWWWWW@@Or:     </text>
      <text x="0" y="290">      =cO@@WWWWWW#*:*Ox*----::. :+--:...'-::=+rWWWWWWWWWWWWWW@@Oc=      </text>
      <text x="0" y="300">       =cO@@WWW  .c-:-xOx*-:--:::....'' .':=-+-WWWWWWWWWWWWW@@Oc=       </text>
      <text x="0" y="310">        =cO@@x   *r=-::=x##Xc*=:''''':::+cc-+r  O@WWWWWWWWW@@Oc=        </text>
      <text x="0" y="320">         =cO+  -*=+*=-:':=rx#WWOc+:'.  .-=+c@r.      -*x#@@@Oc=         </text>
      <text x="0" y="330">              .*---*+=-::::::-+r#WWWW#O###@Wc-=            .''          </text>
      <text x="0" y="340">               ::::=+++=-:--::::-=*cxXxXxr='':-                         </text>
      <text x="0" y="350">               ...':=====---------:'':-:-==+++*                         </text>
      <text x="0" y="360">                .':-==--=-::::'.''''-====++=---                         </text>
      <text x="0" y="370">                .':----:''''::':::'':---::''':                          </text>
      <text x="0" y="380">                     .... .'''''''''''''''':'                           </text>
      <text x="0" y="390">                        .. ........  ..''''                             </text>
      <text x="0" y="400">                                     ..'''                              </text>
    </g>
  </g>

  <!-- Scanner Line Sweep (Subtle Ice Blue) -->
  <line x1="10" y1="0" x2="440" y2="0" stroke="#38BDF8" stroke-width="1.2" filter="url(#glow)" opacity="0.4">
    <animate attributeName="y1" values="0;450" dur="4.5s" repeatCount="indefinite" />
    <animate attributeName="y2" values="0;450" dur="4.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.1;0.9;1" dur="4.5s" repeatCount="indefinite" />
  </line>

  <!-- Border Frame -->
  <rect x="0.5" y="0.5" width="449" height="449" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" rx="12" />
</svg>
