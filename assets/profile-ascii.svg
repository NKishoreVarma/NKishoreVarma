<svg xmlns="http://www.w3.org/2000/svg" width="450" height="450" viewBox="0 0 450 450">
  <defs>
    <!-- Cyan glow and effects gradients -->
    <linearGradient id="shimmerGrad" x1="-100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
      <animate attributeName="x1" values="-100%;200%" dur="5s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0%;300%" dur="5s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Scanline pattern overlay -->
    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#7DD3FC" stroke-width="0.5" opacity="0.06" />
    </pattern>

    <!-- Subtle Ambient Radial Glow behind portrait -->
    <radialGradient id="portraitGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#7DD3FC" stop-opacity="0" />
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .font-mono { font-family: "SF Mono", "Fira Code", Consolas, monospace; }
    
    /* Plain flat terminal styling */
    .term-bg { fill: #050816; }
    .ascii-portrait { fill: #7DD3FC; font-size: 2.5px; letter-spacing: 0.4px; }
    .tech-text { font-family: "SF Mono", "Fira Code", Consolas, monospace; font-size: 8px; fill: #7DD3FC; opacity: 0.5; }
    
    @keyframes floatOpacity {
      0%, 100% { opacity: 0.88; }
      50% { opacity: 0.98; }
    }
    .portrait-group { animation: floatOpacity 6s infinite ease-in-out; }
  </style>

  <!-- Deep Navy Background -->
  <rect width="100%" height="100%" class="term-bg" rx="12" />

  <!-- Ambient Pulsing Glow behind face -->
  <circle cx="225" cy="225" r="200" fill="url(#portraitGlow)">
    <animate attributeName="opacity" values="0.5;1.0;0.5" dur="6s" repeatCount="indefinite" />
  </circle>

  <!-- Bounding Corner Brackets -->
  <g stroke="#7DD3FC" stroke-width="1.2" opacity="0.3" fill="none">
    <path d="M 25 45 L 25 25 L 45 25" />
    <path d="M 405 25 L 425 25 L 425 45" />
    <path d="M 25 405 L 25 425 L 45 425" />
    <path d="M 405 425 L 425 425 L 425 405" />
  </g>

  <!-- Technical Labels -->
  <g class="tech-text">
    <text x="35" y="40">SYS.ASCII // PORTRAIT SCAN</text>
    <text x="35" y="415">DENSITY: 150 COLUMNS</text>
    <text x="415" y="40" text-anchor="end">STATUS: NOMINAL</text>
    <text x="415" y="415" text-anchor="end">ID: NAGARAJU K. VARMA</text>
  </g>

