<svg xmlns="http://www.w3.org/2000/svg" width="450" height="450" viewBox="0 0 450 450">
  <defs>
    <!-- Ice Blue -> Soft Cyan -> White highlights -->
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="60%" stop-color="#67E8F9" />
      <stop offset="100%" stop-color="#F8FAFC" />
      <animate attributeName="x1" values="0%;100%;0%" dur="12s" repeatCount="indefinite" />
      <animate attributeName="y1" values="0%;100%;0%" dur="12s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Scanner Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Reveal Mask for line-by-line typing reveal -->
    <mask id="revealMask">
      <rect x="0" y="0" width="450" height="0" fill="#ffffff">
        <animate attributeName="height" to="450" dur="2.5s" begin="0.2s" fill="freeze" keyTimes="0;1" calcMode="spline" keySplines="0.1 0.8 0.2 1" />
      </rect>
    </mask>
  </defs>

  <!-- Deep Navy Background -->
  <rect width="100%" height="100%" fill="#020617" rx="12" />

  <!-- Grid overlay -->
  <g opacity="0.02">
    <path d="M 0 50 L 450 50 M 0 100 L 450 100 M 0 150 L 450 150 M 0 200 L 450 200 M 0 250 L 450 250 M 0 300 L 450 300 M 0 350 L 450 350 M 0 400 L 450 400" stroke="#ffffff" stroke-width="1" />
    <path d="M 50 0 L 50 450 M 100 0 L 100 450 M 150 0 L 150 450 M 200 0 L 200 450 M 250 0 L 250 450 M 300 0 L 300 450 M 350 0 L 350 450 M 400 0 L 400 450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- ASCII Text Container (Ultra High Definition 72x40 from new close-up photo) -->
  <g mask="url(#revealMask)" fill="url(#cyberGrad)" font-family="SF Mono, Fira Code, Consolas, monospace" font-size="7.2" letter-spacing="0.8">
    <g transform="translate(15, 20)">
      <animateTransform attributeName="transform" type="translate" values="15,20; 15,16; 15,20" dur="6s" repeatCount="indefinite" />
      
      <text x="0" y="10">                       :-==+*rxxxxxxxxxxxxr*+==-:                       </text>
      <text x="0" y="20">                     :-=++**rcxxxxxxxxxxxxcr**++=-:                     </text>
      <text x="0" y="30">                  ':-=+*rrcccxxxxxxxxxxxxxxcccrr*+=-:'                  </text>
      <text x="0" y="40">                ':-=*rrcccxxxxxxxxxxxxxxxxxxxxxccrr*+-:'                </text>
      <text x="0" y="50">               :-+*rccxxXXO#XxxxxXxXXXXXXXXXXxxxxxxcr*+-:               </text>
      <text x="0" y="60">             :-+*rrccXX#@‚Ėą‚Ėą‚Ėą‚Ėą@##OXXXXXxxxXXXXXXXXxXxxcr*+=:             </text>
      <text x="0" y="70">           '-=*rcX#@@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąOXXXXXXOXXXXXxxcr*+-'           </text>
      <text x="0" y="80">          '-+rrX@@@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąrO#OXXXXXXXXXXxxcr+-'          </text>
      <text x="0" y="90">         :-*XO#@@@‚Ėą‚Ėą‚Ėą‚ĖąX‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą#x‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@OOOOXXXXXXxxr+-'         </text>
      <text x="0" y="100">        :=rX#@@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąO‚Ėą#X‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@#XXXXXXxr*-'        </text>
      <text x="0" y="110">        +rX#@@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@O‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@O#Oc*-        </text>
      <text x="0" y="120">       =rX#@@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėącx@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąO@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@@Xc*-       </text>
      <text x="0" y="130">      -*x#@@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąX‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą#c@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@OXc+-      </text>
      <text x="0" y="140">      +cO@@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą#@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@‚Ėą‚Ėą@@OXc+      </text>
      <text x="0" y="150">     -rX#@@X‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąX*X‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@X‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@#Xr-     </text>
      <text x="0" y="160">     +cOX@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@-cxXX‚Ėąxr‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą*=+r‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@Oc+     </text>
      <text x="0" y="170">    -*X#@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąO@@‚Ėą‚Ėą‚ĖąXr#‚Ėą‚Ėą‚Ėą‚Ėą-+@‚Ėą‚Ėąx'#XxXx+*r==+*xO@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą#@‚Ėą##Oc*-    </text>
      <text x="0" y="180">    =rO@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@##‚Ėąx=c‚Ėą‚Ėą-   :'  +X*+*:. .:-=*ccx‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@Or=    </text>
      <text x="0" y="190">    =cO@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą#xc@‚ĖąOrc*.     ::':        .+*x‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@Oc=    </text>
      <text x="0" y="200">    =cO@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@X‚Ėą@+O‚Ėą‚Ėą‚Ėą‚Ėą@#@x+c*.       .=X‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@Oc=    </text>
      <text x="0" y="210">    =cO@@‚Ėąr#‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą##OOx=   ':=++---=c‚Ėą#+:    '=***rc‚Ėą‚ĖąO#‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@Oc=    </text>
      <text x="0" y="220">    =cO@@:   =c‚Ėą‚Ėą‚ĖąO+=*‚Ėą@c:       :=-.:rcc+ .+=  +rrcxXxO@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@Oc=    </text>
      <text x="0" y="230">    =rO@@X      x‚Ėąc+:'-=++rr+:           :c+x‚Ėąr .::*xO@‚ĖąOr‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@Or=    </text>
      <text x="0" y="240">    -*X#@@r .  . c@r=-.     '            =   r* ..:X‚Ėą@@xr‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@#X*-    </text>
      <text x="0" y="250">     +cO@@‚Ėą‚Ėąc:. .*@x++='    .           :    .x-':+@@Ocx‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@Oc+     </text>
      <text x="0" y="260">     -rX#@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą=xOc*+=:                     -r-r‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@#Xr-     </text>
      <text x="0" y="270">      +cO@@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėąx=Xc*=+=-'.                 '==*‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@@Oc+      </text>
      <text x="0" y="280">      -*x#@@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą-r#r=---::'.    .':'---+=-r#O‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@@#x*-      </text>
      <text x="0" y="290">       =rX#@@@‚Ėą‚Ėą‚Ėą#*:*Ox*----::. :+--:...'-::=+r‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@@#Xr=       </text>
      <text x="0" y="300">        +rX#@@@  .c-:-xOx*-:--:::....'' .':=-+-‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@@#Xr+        </text>
      <text x="0" y="310">        :+rX#x   *r=-::=x##Xc*=:''''':::+cc-+r  O@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@@#Xr+:        </text>
      <text x="0" y="320">         :+r=  -+=+*=-:':=rx#‚Ėą‚ĖąOc+:'.  .-=+c@r.      -*x#@#Xr+:         </text>
      <text x="0" y="330">              .+-:-*+=-::::::-+r#‚Ėą‚Ėą‚Ėą‚Ėą#O###@‚Ėąc-=            .'.          </text>
      <text x="0" y="340">               ''':-+++=-:--::::-=*cxXxXxr='':-                         </text>
      <text x="0" y="350">               ....:-====---------:'':-:-==+++*                         </text>
      <text x="0" y="360">                ..':==--=-::::'.''''-====++=---                         </text>
      <text x="0" y="370">                ..'':::::'''':'':::'':---::'.':                          </text>
      <text x="0" y="380">                     .... .'''''''''''''''''.                           </text>
      <text x="0" y="390">                        .  ........  ..''''                             </text>
      <text x="0" y="400">                                     ..'''                              </text>
    </g>
  </g>

  <!-- Scanner Line Sweep (Subtle Ice Blue) -->
  <line x1="10" y1="0" x2="440" y2="0" stroke="#38BDF8" stroke-width="1.2" filter="url(#glow)" opacity="0.4">
    <animate attributeName="y1" values="0;450" dur="4.5s" repeatCount="indefinite" />
    <animate attributeName="y2" values="0;450" dur="4.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.1;0.9;1" dur="4.5s" repeatCount="indefinite" />
  </line>

  <!-- Border Frame -->
  <rect x="0.5" y="0.5" width="449" height="449" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" rx="12" />
</svg>
