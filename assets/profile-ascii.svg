<svg xmlns="http://www.w3.org/2000/svg" width="450" height="450" viewBox="0 0 450 450">
  <defs>
    <!-- Soft Cyan -> Deep Cyan gradient for HUD lines -->
    <linearGradient id="hudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>

    <!-- Radar glow behind face -->
    <radialGradient id="radarGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.22" />
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0" />
    </radialGradient>

    <!-- Scanning laser filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Scanline pattern overlay -->
    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#22D3EE" stroke-width="0.5" opacity="0.08" />
    </pattern>

    <!-- Blueprint Grid Pattern -->
    <pattern id="blueprintGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#22D3EE" stroke-width="0.5" opacity="0.05" />
    </pattern>
  </defs>

  <style>
    .hud-line { fill: none; stroke: url(#hudGrad); stroke-linecap: round; stroke-linejoin: round; }
    .hud-primary { stroke-width: 1.8; filter: drop-shadow(0 0 1px rgba(34, 211, 238, 0.4)); }
    .hud-secondary { stroke-width: 1.0; stroke: #94A3B8; opacity: 0.6; }
    .hud-mesh { stroke: #22D3EE; stroke-width: 0.6; opacity: 0.35; stroke-dasharray: 2 3; fill: none; }
    .hud-mesh-node { fill: #22D3EE; stroke: #050816; stroke-width: 1; filter: drop-shadow(0 0 2px #22D3EE); }
    .hud-text { font-family: "SF Mono", "Fira Code", Consolas, monospace; font-size: 8px; fill: #22D3EE; opacity: 0.6; }
    .hud-data { font-family: "SF Mono", "Fira Code", Consolas, monospace; font-size: 7px; fill: #94A3B8; }
    
    /* Animation keyframes */
    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 0.8; }
      100% { opacity: 0.3; }
    }
    .mesh-pulse { animation: pulse 3s infinite ease-in-out; }
  </style>

  <!-- Deep Navy Base Background -->
  <rect width="100%" height="100%" fill="#050816" rx="12" />

  <!-- Blueprint Grid Overlay -->
  <rect width="100%" height="100%" fill="url(#blueprintGrid)" rx="12" />

  <!-- Target Tracking Circles (HUD Radar) -->
  <g opacity="0.15">
    <circle cx="225" cy="210" r="140" fill="none" stroke="#22D3EE" stroke-width="0.8" stroke-dasharray="4 8" />
    <circle cx="225" cy="210" r="180" fill="none" stroke="#22D3EE" stroke-width="0.5" />
    <circle cx="225" cy="210" r="80" fill="none" stroke="#22D3EE" stroke-width="0.5" stroke-dasharray="2 4" />
    <!-- Crosshairs -->
    <path d="M 225 10 L 225 440 M 10 210 L 440 210" stroke="#22D3EE" stroke-width="0.5" />
  </g>

  <!-- Ambient Glow behind Head -->
  <circle cx="225" cy="210" r="160" fill="url(#radarGlow)" />

  <!-- Technical Bounding Corner Brackets -->
  <g stroke="#22D3EE" stroke-width="1.2" opacity="0.4" fill="none">
    <path d="M 25 45 L 25 25 L 45 25" />
    <path d="M 405 25 L 425 25 L 425 45" />
    <path d="M 25 405 L 25 425 L 45 425" />
    <path d="M 405 425 L 425 425 L 425 405" />
  </g>

  <!-- Technical Telemetry Data -->
  <g class="hud-text">
    <text x="35" y="40">SYS.SCAN // SYSTEM: ACTIVE</text>
    <text x="35" y="415">LANDMARK MESH: 38 POINTS</text>
    <text x="415" y="40" text-anchor="end">SIGNAL: NOMINAL</text>
    <text x="415" y="415" text-anchor="end">IDENT_MATCH: Nagaraju K. Varma</text>
  </g>

  <!-- ================= GEOMETRIC PORTRAIT CONTOURS (EXACT PROPORTIONS) ================= -->
  <g transform="translate(0, 0)">
    <!-- Face Silhouette Outline -->
    <path class="hud-line hud-primary" d="M 165,185 C 165,260 190,308 222,308 C 255,308 280,260 280,185 C 280,160 268,145 222,145 C 176,145 165,160 165,185 Z" />

    <!-- Volumetric Curly Hair Silhouette -->
    <path class="hud-line hud-primary" d="M 152,185 C 142,140 148,95 178,78 C 193,70 215,65 230,75 C 248,68 275,68 290,82 C 304,95 306,120 302,140 C 310,150 308,168 294,185 C 288,190 280,185 280,185 Z" />

    <!-- Hair Curvature Textures -->
    <path class="hud-line hud-secondary" d="M 160,150 C 170,120 190,110 210,130" />
    <path class="hud-line hud-secondary" d="M 180,130 C 195,100 220,105 235,135" />
    <path class="hud-line hud-secondary" d="M 240,110 C 255,85 280,100 290,130" />
    <path class="hud-line hud-secondary" d="M 175,90 C 200,75 230,80 250,95" />
    <path class="hud-line hud-secondary" d="M 220,70 C 245,60 270,68 285,85" />
    
    <!-- Forehead Curls falling onto forehead -->
    <path class="hud-line hud-primary" d="M 215,120 Q 202,145 218,162 M 185,130 Q 172,155 188,168 M 245,125 Q 232,150 246,162 M 225,125 Q 218,145 228,152" stroke-width="1.2" />

    <!-- Eyeglasses (Rectangular Clear Frames, exact shape) -->
    <rect class="hud-line hud-primary" x="160" y="176" width="52" height="34" rx="6" stroke-width="1.8" />
    <rect class="hud-line hud-primary" x="228" y="176" width="46" height="34" rx="6" stroke-width="1.8" />
    <path class="hud-line hud-primary" d="M 212,186 Q 220,183 228,186" stroke-width="2.2" />
    <path class="hud-line hud-secondary" d="M 160,182 L 140,195 Q 138,196 142,202" />

    <!-- Eyes (Exact alignment) -->
    <path class="hud-line hud-secondary" d="M 172,192 C 178,189 188,189 194,192 M 174,193 C 179,197 187,197 192,193" />
    <path class="hud-line hud-secondary" d="M 238,192 C 244,189 252,189 258,192 M 240,193 C 245,197 251,197 256,193" />
    <circle cx="184" cy="193" r="2" fill="#F8FAFC" />
    <circle cx="249" cy="193" r="2" fill="#F8FAFC" />
    <!-- Eyebrows -->
    <path class="hud-line hud-primary" d="M 166,180 Q 182,173 198,181" stroke-width="1.4" />
    <path class="hud-line hud-primary" d="M 232,181 Q 248,173 264,180" stroke-width="1.4" />

    <!-- Nose -->
    <path class="hud-line hud-primary" d="M 221,186 L 221,226 Q 221,231 214,230" />
    <path class="hud-line hud-secondary" d="M 224,227 C 227,227 229,224 227,221" />

    <!-- Lips (Serious expression) -->
    <path class="hud-line hud-primary" d="M 202,250 Q 220,245 237,248" />
    <path class="hud-line hud-secondary" d="M 208,255 Q 220,259 231,255" />

    <!-- Beard Line & Mustache -->
    <path class="hud-line hud-secondary" d="M 148,206 C 148,255 174,306 215,306 C 255,306 284,255 284,206" stroke-dasharray="3 2" />
    <path class="hud-line hud-primary" d="M 200,243 Q 220,237 236,243" stroke-width="1.2" />
    <path class="hud-line hud-primary" d="M 215,264 Q 220,266 225,264" stroke-width="1.2" />

    <!-- Neck -->
    <path class="hud-line hud-secondary" d="M 194,288 L 194,305 M 250,288 L 250,305" />

    <!-- V-Neck Collared Striped Shirt & Shoulders -->
    <path class="hud-line hud-primary" d="M 194,302 L 174,342 L 208,352 L 222,320 L 236,352 L 270,342 L 250,302 Z" />
    <path class="hud-line hud-secondary" d="M 210,302 L 222,320 L 234,302" />
    <path class="hud-line hud-primary" d="M 155,342 C 130,360 106,400 106,415 L 338,415 C 338,400 314,360 289,342 Z" />
    
    <!-- Vertical Stripes on Shirt -->
    <line class="hud-line hud-secondary" x1="140" y1="365" x2="130" y2="415" stroke-dasharray="3 3" />
    <line class="hud-line hud-secondary" x1="175" y1="350" x2="170" y2="415" stroke-dasharray="3 3" />
    <line class="hud-line hud-secondary" x1="205" y1="355" x2="205" y2="415" stroke-dasharray="3 3" />
    <line class="hud-line hud-secondary" x1="239" y1="355" x2="239" y2="415" stroke-dasharray="3 3" />
    <line class="hud-line hud-secondary" x1="269" y1="350" x2="274" y2="415" stroke-dasharray="3 3" />
    <line class="hud-line hud-secondary" x1="305" y1="365" x2="315" y2="415" stroke-dasharray="3 3" />

    <!-- Crossed Arms -->
    <path class="hud-line hud-primary" d="M 96,405 C 96,405 146,370 222,370 C 298,370 348,405 348,405 L 338,438 L 106,438 Z" />
    <path class="hud-line hud-primary" d="M 104,412 C 156,388 216,388 256,402" />
    <path class="hud-line hud-primary" d="M 338,412 C 286,388 226,388 186,402" />
    <path class="hud-line hud-secondary" d="M 126,425 Q 222,405 318,425" />
  </g>

  <!-- ================= FUTURISTIC HUD FACIAL LANDMARK MESH ================= -->
  <g class="mesh-pulse">
    <!-- Mesh lines connecting key features -->
    <path class="hud-mesh" d="
      M 184,193 L 249,193 
      M 184,193 L 221,186 L 249,193 
      M 184,193 L 221,226 M 249,193 L 221,226
      M 165,185 L 184,193 M 280,185 L 249,193
      M 221,226 L 202,250 M 221,226 L 237,248
      M 202,250 L 222,308 M 237,248 L 222,308
      M 148,206 L 165,185 M 284,206 L 280,185
      M 148,206 L 202,250 M 284,206 L 237,248
      M 165,260 L 202,250 M 280,260 L 237,248
    " />

    <!-- Holographic Tracking Node Dots -->
    <circle class="hud-mesh-node" cx="184" cy="193" r="2.5" /> <!-- Left Eye -->
    <circle class="hud-mesh-node" cx="249" cy="193" r="2.5" /> <!-- Right Eye -->
    <circle class="hud-mesh-node" cx="221" cy="226" r="2.5" /> <!-- Nose Tip -->
    <circle class="hud-mesh-node" cx="202" cy="250" r="2.5" /> <!-- Left Mouth Corner -->
    <circle class="hud-mesh-node" cx="237" cy="250" r="2.5" /> <!-- Right Mouth Corner -->
    <circle class="hud-mesh-node" cx="222" cy="308" r="2.5" /> <!-- Chin Tip -->
    <circle class="hud-mesh-node" cx="165" cy="185" r="2" />   <!-- Left Cheek High -->
    <circle class="hud-mesh-node" cx="280" cy="185" r="2" />   <!-- Right Cheek High -->
    <circle class="hud-mesh-node" cx="148" cy="206" r="2" />   <!-- Left Jaw Node -->
    <circle class="hud-mesh-node" cx="284" cy="206" r="2" />   <!-- Right Jaw Node -->
    
    <!-- Data overlay callouts -->
    <line x1="249" y1="193" x2="310" y2="160" stroke="#22D3EE" stroke-width="0.8" opacity="0.5" />
    <text x="315" y="158" class="hud-data">SYS.EYE.R // LOCK_ON</text>

    <line x1="222" y1="308" x2="280" y2="340" stroke="#22D3EE" stroke-width="0.8" opacity="0.5" />
    <text x="285" y="344" class="hud-data">J-LINE.LOCK // 80.64°</text>
  </g>

  <!-- ================= ANIMATED FLOATING PARTICLES ================= -->
  <g opacity="0.6">
    <circle cx="80" cy="120" r="1.5" fill="#22D3EE">
      <animate attributeName="cy" values="120;90;120" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="340" cy="140" r="1.5" fill="#22D3EE">
      <animate attributeName="cy" values="140;170;140" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="120" cy="280" r="2" fill="#22D3EE">
      <animate attributeName="cy" values="280;250;280" dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="310" cy="300" r="1.5" fill="#22D3EE">
      <animate attributeName="cy" values="300;270;300" dur="4.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Subtle Scanline overlay -->
  <rect x="25" y="25" width="400" height="400" fill="url(#scanlines)" pointer-events="none" rx="12" />

  <!-- Animated Scanner Sweep line -->
  <line x1="25" y1="25" x2="425" y2="25" stroke="#22D3EE" stroke-width="1.2" opacity="0.4" filter="url(#glow)">
    <animate attributeName="y1" values="25;425;25" dur="6s" repeatCount="indefinite" />
    <animate attributeName="y2" values="25;425;25" dur="6s" repeatCount="indefinite" />
  </line>

  <!-- Border Frame -->
  <rect x="0.5" y="0.5" width="449" height="449" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" rx="12" />
</svg>
