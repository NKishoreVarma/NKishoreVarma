<svg xmlns="http://www.w3.org/2000/svg" width="450" height="450" viewBox="0 0 450 450">
  <defs>
    <!-- Ice Blue -> Soft Cyan -> White highlights -->
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="60%" stop-color="#67E8F9" />
      <stop offset="100%" stop-color="#F8FAFC" />
      <animate attributeName="x1" values="0%;100%;0%" dur="10s" repeatCount="indefinite" />
      <animate attributeName="y1" values="0%;100%;0%" dur="10s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Scanner Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Reveal Mask for line-by-line typing reveal -->
    <mask id="revealMask">
      <rect x="0" y="0" width="450" height="0" fill="#ffffff">
        <animate attributeName="height" to="450" dur="2.5s" begin="0.2s" fill="freeze" keyTimes="0;1" calcMode="spline" keySplines="0.1 0.8 0.2 1" />
      </rect>
    </mask>
  </defs>

  <!-- Deep Navy Background -->
  <rect width="100%" height="100%" fill="#020617" rx="12" />

  <!-- Grid overlay -->
  <g opacity="0.02">
    <path d="M 0 50 L 450 50 M 0 100 L 450 100 M 0 150 L 450 150 M 0 200 L 450 200 M 0 250 L 450 250 M 0 300 L 450 300 M 0 350 L 450 350 M 0 400 L 450 400" stroke="#ffffff" stroke-width="1" />
    <path d="M 50 0 L 50 450 M 100 0 L 100 450 M 150 0 L 150 450 M 200 0 L 200 450 M 250 0 L 250 450 M 300 0 L 300 450 M 350 0 L 350 450 M 400 0 L 400 450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- ASCII Text Container -->
  <g mask="url(#revealMask)" fill="url(#cyberGrad)" font-family="SF Mono, Fira Code, Consolas, monospace" font-size="9" letter-spacing="1.2">
    <!-- Breathing Floating Motion -->
    <g transform="translate(15, 25)">
      <animateTransform attributeName="transform" type="translate" values="15,25; 15,20; 15,25" dur="6s" repeatCount="indefinite" />
      
      <text x="0" y="10">‚Ėą‚Ėą‚Ėą‚Ėą#=.     -‚Ėą‚Ėą#‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą.    -‚Ėą‚Ėą‚Ėą@=@‚Ėą‚Ėą‚Ėą‚Ėą=-‚Ėą‚Ėą‚Ėą#%‚Ėą‚Ėą%#‚Ėą‚Ėą</text>
      <text x="0" y="21">‚Ėą#+*::.-. ::  @:%‚Ėą+%%*‚Ėą%#+.   =-*‚Ėą‚Ėą‚Ėą‚Ėą#*#=-+‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</text>
      <text x="0" y="32">‚Ėą#-:%@*+==‚Ėą‚Ėą‚Ėą  =+‚Ėą*#%+=-=+ . -=-@‚Ėą#‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@*#@%=#@+-#‚Ėą‚Ėą‚Ėą</text>
      <text x="0" y="43">%%-%##‚Ėą= :‚Ėą‚Ėą‚Ėą‚Ėą  :=‚Ėą‚Ėą‚Ėą‚Ėą*%+%‚Ėą=..%‚Ėą@:‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą*+=‚Ėą#:::--: -*</text>
      <text x="0" y="54">-==+++.+:  =‚Ėą‚Ėą‚Ėą‚Ėą . #‚Ėą‚Ėą‚Ėą#==‚Ėą‚Ėą*  ‚Ėą‚Ėą‚Ėą@‚Ėą‚Ėą‚Ėą#--%++= ::=: .:==</text>
      <text x="0" y="65">‚Ėą‚Ėą‚Ėą%*#%*@%‚Ėą‚Ėą%‚Ėą‚Ėą- . @‚Ėą‚Ėą%=*‚Ėą‚Ėą‚Ėą+.+‚Ėą‚Ėą%=‚Ėą‚Ėą‚Ėą@%@%@%+@‚Ėą‚Ėą%-*#‚Ėą#</text>
      <text x="0" y="76">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą#%+*‚Ėą*. %+‚Ėą%+-*%‚Ėą@..=‚Ėą‚Ėą+@@#‚Ėą‚Ėą#+--+:%%%@%##++</text>
      <text x="0" y="87">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą*‚Ėą% -*  :%. ..*+*::.=+#++@‚Ėą%%=-:=::-.=@#=-*‚Ėą</text>
      <text x="0" y="98">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą*#@%*-  -  . .:. :.--+==##@+=-:..  .:=.:-#‚Ėą</text>
      <text x="0" y="109">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą%#=+#. .     .   ::.:--=---+===::-.    : -*#%</text>
      <text x="0" y="120">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@--+-            :-=-- :::-==.::.-..: : :=+++=</text>
      <text x="0" y="131">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą#:.  =- .        .     . :==+::=++:---=---::::</text>
      <text x="0" y="142">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą#*=-  -- =+.              -+==++=++===+++==+:-=</text>
      <text x="0" y="153">‚Ėą‚Ėą‚Ėą‚Ėą@@#=:-..    -:=+*.      :-  :...::-------:---===++</text>
      <text x="0" y="164">‚Ėą‚Ėą‚Ėą@%++=..   .: :: :==   ...-=.  .:=+=---+--::.. :---+</text>
      <text x="0" y="175">‚Ėą‚Ėą@@@%+=:  .---:.  .-    .   .:: :=+-+==+=%+=-.:.-----</text>
      <text x="0" y="186">‚Ėą@@@‚Ėą#*=:==+.. :-  :               ++=--===*--=-::-:. </text>
      <text x="0" y="197">@%#@‚Ėą‚Ėą@#==  -=.:-=                 :+=::-::.::    .   </text>
      <text x="0" y="208">%*%@‚Ėą‚Ėą#@+%*+=*==+=                 .=:.:--.     . .   </text>
      <text x="0" y="219">‚Ėą@‚Ėą‚Ėą#%@@%%‚Ėą%. :.:=                 .    =+-         : </text>
      <text x="0" y="230">‚Ėą‚Ėą%@‚Ėą@#‚Ėą@#%=.   :+                 --   :..    .:--:. </text>
      <text x="0" y="241">+%##‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@=--++%+*=         .-    .=-:::      :.:::::.</text>
      <text x="0" y="252">+%‚Ėą#%‚Ėą‚Ėą%#%***%#+**=              :-+:-:==-   =::  .:.:</text>
      <text x="0" y="263">@%+=-=%###**%*=+==-:             .     ..    . :     .</text>
      <text x="0" y="274">     -=*%:-=-*=.  - .%                             .  </text>
      <text x="0" y="285">       .----::=+-   ‚Ėą‚Ėą+         #+::.  .:             </text>
      <text x="0" y="296">       :-.    .-%#‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą=        #‚Ėą‚Ėą‚Ėą+....  .          </text>
      <text x="0" y="307">             =‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą-      *‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą%-.    :.    </text>
      <text x="0" y="318">           #‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą%=‚Ėą=  . =‚Ėą‚Ėą#*%‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą*  . ..  . </text>
      <text x="0" y="329">          ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą##%@@=. ##+*@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą%         </text>
      <text x="0" y="340">          ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@%%%: *+@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą         </text>
      <text x="0" y="351">          ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą%++%#‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą*        </text>
      <text x="0" y="362">    ..   :‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą%%#@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą#@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą       </text>
      <text x="0" y="373">+#*+*#+  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@%%‚Ėą‚Ėą‚Ėą%@@#%#@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą*%‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą     . </text>
      <text x="0" y="384">‚Ėą‚Ėą#=.-==  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą*%‚Ėą‚Ėą#@%%#@‚Ėą@‚Ėą@‚Ėą‚Ėą‚Ėą@+*#‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą   :+:</text>
      <text x="0" y="395">%*+%%++=- +‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@%‚Ėą‚Ėą%%**%@‚Ėą‚Ėą‚Ėą@‚Ėą‚Ėą‚Ėą###‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@‚Ėą@   - </text>
    </g>
  </g>

  <!-- Scanner Line Sweep (Subtle Ice Blue) -->
  <line x1="10" y1="0" x2="440" y2="0" stroke="#38BDF8" stroke-width="1" filter="url(#glow)" opacity="0.4">
    <animate attributeName="y1" values="0;450" dur="4.5s" repeatCount="indefinite" />
    <animate attributeName="y2" values="0;450" dur="4.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.1;0.9;1" dur="4.5s" repeatCount="indefinite" />
  </line>

  <!-- Border Frame -->
  <rect x="0.5" y="0.5" width="449" height="449" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" rx="12" />
</svg>
