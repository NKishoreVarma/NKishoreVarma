<svg xmlns="http://www.w3.org/2000/svg" width="450" height="450" viewBox="0 0 450 450">
  <defs>
    <!-- Ice Blue -> Soft Cyan -> White highlights -->
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="60%" stop-color="#67E8F9" />
      <stop offset="100%" stop-color="#F8FAFC" />
      <animate attributeName="x1" values="0%;100%;0%" dur="10s" repeatCount="indefinite" />
      <animate attributeName="y1" values="0%;100%;0%" dur="10s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Scanner Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Reveal Mask for line-by-line typing reveal -->
    <mask id="revealMask">
      <rect x="0" y="0" width="450" height="0" fill="#ffffff">
        <animate attributeName="height" to="450" dur="2.5s" begin="0.2s" fill="freeze" keyTimes="0;1" calcMode="spline" keySplines="0.1 0.8 0.2 1" />
      </rect>
    </mask>
  </defs>

  <!-- Deep Navy Background -->
  <rect width="100%" height="100%" fill="#020617" rx="12" />

  <!-- Grid overlay -->
  <g opacity="0.02">
    <path d="M 0 50 L 450 50 M 0 100 L 450 100 M 0 150 L 450 150 M 0 200 L 450 200 M 0 250 L 450 250 M 0 300 L 450 300 M 0 350 L 450 350 M 0 400 L 450 400" stroke="#ffffff" stroke-width="1" />
    <path d="M 50 0 L 50 450 M 100 0 L 100 450 M 150 0 L 150 450 M 200 0 L 200 450 M 250 0 L 250 450 M 300 0 L 300 450 M 350 0 L 350 450 M 400 0 L 400 450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- ASCII Text Container (Ultra High Definition 72x40 from new close-up photo) -->
  <g mask="url(#revealMask)" fill="url(#cyberGrad)" font-family="SF Mono, Fira Code, Consolas, monospace" font-size="7.2" letter-spacing="0.8">
    <g transform="translate(15, 20)">
      <animateTransform attributeName="transform" type="translate" values="15,20; 15,16; 15,20" dur="6s" repeatCount="indefinite" />
      
      <text x="0" y="10">========================================================================</text>
      <text x="0" y="20">========================================================================</text>
      <text x="0" y="30">========================================================================</text>
      <text x="0" y="40">========================================================================</text>
      <text x="0" y="50">===========================::===========================================</text>
      <text x="0" y="60">====================++=-.   '-==-=====+===-=============================</text>
      <text x="0" y="70">=================+=-'                ..:---------=====----------------=-</text>
      <text x="0" y="80">=============--=-'                      :r:===----=-=-------------------</text>
      <text x="0" y="90">==-=====-=-==--=      ''       .         '   '--------------------------</text>
      <text x="0" y="100">---------:''                  .'                .':-==------------------</text>
      <text x="0" y="110">-------:' .                               ='='       ''::::-------------</text>
      <text x="0" y="120">-------'                       =:             '-         '.'::-:::::::::</text>
      <text x="0" y="130">-------   '                   *=       ..        '         '':::::::::::</text>
      <text x="0" y="140">::::::               -+.              =*                    ''''''''''''</text>
      <text x="0" y="150">:::::'               .                               .  .    '.'''.'''''</text>
      <text x="0" y="160">''''''   .. :.              'Xr.                     :        . .  .....</text>
      <text x="0" y="170">......   '        .          rx+=- +*      '#OX=              ''.       </text>
      <text x="0" y="180">..  .            : .   +r    r#'  r@'+*=rOxxXxc*=:        :.''''.       </text>
      <text x="0" y="190">                   .:''rx: =‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąX=cxc‚Ėą‚Ėą‚Ėą@#Ox*+*                      </text>
      <text x="0" y="200">                     :*+  +r+#‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@#‚Ėą@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąOx*                      </text>
      <text x="0" y="210">                      '- +r    .'.=x*x‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@*                        </text>
      <text x="0" y="220">           -:      '''-*#‚Ėą‚Ėą@OxcrxXOX+ -O‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąOcrcrr  :.                 </text>
      <text x="0" y="230">          -‚Ėą‚Ėą‚Ėąx=   -xX= +X‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąXO‚ĖąX++r#‚Ėą@X‚Ėą‚Ėą#*r+=-=-                 </text>
      <text x="0" y="240">          .‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą: *x##*r*c*cx‚Ėą‚Ėą‚Ėą@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@xrr''‚Ėą‚ĖąOOx+-' :*               </text>
      <text x="0" y="250">           =‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą=:cO@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą#‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąO‚Ėą‚ĖąO-‚Ėą‚Ėą‚Ėą‚Ėąr . 'r                </text>
      <text x="0" y="260">            'x‚Ėą‚Ėą‚Ėą‚Ėą*.*xX#‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąO‚Ėą‚Ėą‚Ėą‚Ėą*X‚Ėą@#: :rc                 </text>
      <text x="0" y="270">               -==X:-cxx#‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą*XX-                      </text>
      <text x="0" y="280">                  cr-*cxx#‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąO#+                       </text>
      <text x="0" y="290">                  .O==xOOXO@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@‚Ėą@@#r:+'                        </text>
      <text x="0" y="300">                   OX:+XOOO##@‚Ėą‚Ėą‚ĖąXXXX@##XcOO**-                         </text>
      <text x="0" y="310">                 xXr#O=:rO#OOO@‚Ėą##‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą#Ox'                         </text>
      <text x="0" y="320">               r‚Ėą‚Ėą#*O##r::+xOO###@‚Ėą‚Ėą@#@‚Ėą#xxXx@‚Ėą                         </text>
      <text x="0" y="330">              O‚Ėą‚Ėą‚ĖąrcxO#@#r:.':+x#@@‚Ėą‚Ėą‚Ėą@#c+xO=‚Ėą‚Ėą‚Ėąx*:'                    </text>
      <text x="0" y="340">           '+#‚Ėą‚ĖąccOxcXO#@#OXr-..'=cX#@‚Ėą#Xx+ =X‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąOr-               </text>
      <text x="0" y="350">       'c‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėąx##OcxxO#####@@O*'       .'+#O‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą#r:      .':</text>
      <text x="0" y="360">    +@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą#@@#OxxxX##OO####OOXxcrrcX@@OO#‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąX*=:.'</text>
      <text x="0" y="370">:x‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@#XXOxX##OOOOOO#‚Ėą@OOOXxxcxc#‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėąx</text>
      <text x="0" y="380">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą##OXxXOOX#@##‚Ėą‚Ėą‚Ėą@@@OXXXXXXO#O‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</text>
      <text x="0" y="390">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ĖąXxxXXO##‚Ėą@@@#@@##@@@####@@‚Ėą@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</text>
      <text x="0" y="400">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą@@@@@‚Ėą‚Ėą‚Ėą@@@@@@@@‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą</text>
    </g>
  </g>

  <!-- Scanner Line Sweep (Subtle Ice Blue) -->
  <line x1="10" y1="0" x2="440" y2="0" stroke="#38BDF8" stroke-width="1.2" filter="url(#glow)" opacity="0.4">
    <animate attributeName="y1" values="0;450" dur="4.5s" repeatCount="indefinite" />
    <animate attributeName="y2" values="0;450" dur="4.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.1;0.9;1" dur="4.5s" repeatCount="indefinite" />
  </line>

  <!-- Border Frame -->
  <rect x="0.5" y="0.5" width="449" height="449" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" rx="12" />
</svg>
